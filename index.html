<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>庄腳・收班工作分配</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#FBF7F0; --surface:#fff; --ink:#4F4A43; --ink2:#857F75; --ink3:#ADA79C; --line:#ECE5D9; --tint:#F0ECE3; --accent:#BF5B3D;
    --pre:#F0916F; --am:#F4C543; --mid:#6FB98A; --none:#BBB4A6; --lack:#D7263D; --ok:#6FB98A; --danger:#D7263D; --danger-bg:#FCEBEA; --danger-line:#F3C9C5;
    --grill:#E07A66; --bread:#2E9CB0; --drink:#B5894E; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; color:var(--ink); background:var(--bg); font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; padding-bottom:78px;}
  .app{max-width:680px; margin:0 auto;}
  .head{position:relative; padding:15px 18px 4px;}
  .title{font-size:19px; font-weight:800; letter-spacing:1px;}
  .sub{font-size:12px; color:var(--ink2); margin-top:3px; font-weight:600;}
  .page{display:none;} .page.on{display:block;}
  .hint{font-size:11px; color:var(--ink3); padding:7px 18px 2px; text-align:center;}
  .seg{display:flex; gap:5px; background:#EEE7DC; padding:4px; border-radius:13px; margin:10px 14px 0;}
  .segb{flex:1; text-align:center; padding:9px 2px; border-radius:9px; font-size:13px; font-weight:800; color:var(--ink2);}
  .segb.on{background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(79,74,67,.12);}
  .mono{font-family:"DM Mono",monospace; font-weight:500;}
  .aic{display:inline-flex; align-items:center;}

  /* nav */
  .nav{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line); display:flex; padding:6px 8px calc(6px + env(safe-area-inset-bottom)); z-index:30;}
  .nav button{flex:1; background:none; border:none; padding:6px 2px; font-weight:800; color:var(--ink3); display:flex; flex-direction:column; align-items:center; gap:4px;}
  .nav button.on{color:var(--ink);}
  .nav .ic{width:50px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:11px; transition:background .15s;}
  .nav button.on .ic{background:var(--tint);}
  .nav .ic svg{width:22px; height:22px;}
  .nav .lab{font-size:11px;}

  /* 盤點 */
  .cols{display:grid; grid-template-columns:1fr 1fr; gap:11px; padding:8px 14px;}
  .col{border-radius:16px; padding:9px;}
  .band-ah{display:flex; align-items:center; gap:8px; padding:4px 5px 10px; font-size:14px; font-weight:800;}
  .band-ah .ic{width:27px; height:27px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:var(--tint);}
  .band-ah .ct{font-size:10px; font-weight:700; color:var(--ink3); margin-left:auto;}
  .ccard{background:var(--surface); border:1.5px solid var(--line); border-radius:13px; padding:11px 12px; margin-bottom:8px; box-shadow:0 2px 8px rgba(79,74,67,.06);}
  .ccard.low{border-color:var(--danger-line); background:var(--danger-bg);}
  .crow{display:flex; align-items:center; gap:8px;}
  .cname{font-size:16px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; line-height:1.25;}
  .ctags{display:flex; gap:6px; margin-top:9px;}
  .t-day{font-size:10px; font-weight:800; color:var(--ink2); background:var(--tint); border-radius:6px; padding:3px 8px; white-space:nowrap;}
  .t-urg{font-size:10px; font-weight:800; color:#fff; background:var(--danger); border-radius:6px; padding:3px 8px; white-space:nowrap;}
  .sw{width:44px; height:26px; border-radius:14px; background:var(--ok); position:relative; flex:none;}
  .sw.off{background:var(--danger);} .sw .kn{position:absolute; top:3px; left:21px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .15s; box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .sw.off .kn{left:3px;}
  .cmeta{display:flex; align-items:center; gap:8px; margin-top:11px; font-size:12px; color:var(--ink2);}
  .mlab{font-size:11px; color:var(--ink3); font-weight:700;}
  .mnum{font-family:"DM Mono",monospace; color:var(--ink); font-weight:500;}
  .mnum .u{font-family:-apple-system,"PingFang TC",sans-serif; color:var(--ink2); font-size:11px; margin-left:1px;}
  .msep{width:1px; height:13px; background:var(--line);}
  .step{display:inline-flex; align-items:center; border:1.5px solid var(--line); border-radius:9px; background:#fff; overflow:hidden;}
  .step button{border:none; background:none; width:29px; height:30px; font-size:17px; color:var(--ink2); font-weight:800;}
  .step .vl{min-width:24px; text-align:center; font-family:"DM Mono",monospace; font-size:15px; font-weight:500;}
  .step .u{font-size:10px; color:var(--ink3); padding:0 7px 0 2px; font-weight:700;}
  .bigbtn{display:block; width:calc(100% - 28px); margin:10px 14px 4px; background:var(--ink); color:#fff; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:800;}

  /* 出勤 */
  .attend{display:flex; align-items:center; gap:6px; margin:10px 14px 0; background:#fff; border:1.5px solid var(--line); border-radius:13px; padding:8px 12px;}
  .attend img{width:24px; height:24px; object-fit:contain;}
  .attend .al{font-size:12px; font-weight:800; color:var(--ink2); margin-right:2px;}
  .attend .aedit{margin-left:auto; background:var(--tint); border:none; border-radius:9px; padding:7px 13px; font-size:12px; font-weight:800; color:var(--ink2);}

  /* 圖例 */
  .key{display:flex; gap:7px; margin:10px 14px 2px;}
  .kc{flex:1; display:flex; align-items:center; gap:6px; background:#fff; border-radius:12px; padding:8px; box-shadow:0 1px 4px rgba(79,74,67,.06);}
  .kc .sw2{width:6px; height:18px; border-radius:3px; flex:none;}
  .kc .ku{font-size:11px; font-weight:800;} .kc .kn{font-size:9px; color:var(--ink3); font-weight:700;}
  .kc.lk .sw2{width:auto; height:auto; border-radius:5px; background:var(--lack); color:#fff; font-size:9px; font-weight:800; padding:2px 4px; display:inline-flex; flex-direction:column; align-items:center; line-height:1;}

  /* 卡片/chip 共用 */
  .lack{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#fff; background:var(--lack); border-radius:5px; padding:2px 4px; line-height:1; flex:none;}
  .chip{display:inline-flex; align-items:center; gap:7px; background:#FBF8F2; border:1.5px solid var(--line); border-radius:11px; padding:7px 11px; font-weight:800; font-size:15px; touch-action:none; user-select:none; -webkit-touch-callout:none;}
  .chip.done{opacity:.45; text-decoration:line-through; background:#F3EFE7;}
  .chip .blk{width:5px; height:18px; border-radius:3px; flex:none;}
  .chip .av{width:24px; height:24px; object-fit:contain;}
  .cm{font-size:10px; color:var(--ink3); font-weight:700;}
  .stag{font-size:9px; font-weight:800; border-radius:5px; padding:1px 5px; line-height:1.4; flex:none;}
  .stag.plan{color:#356074; background:#E3EFF3;}
  .stag.short{color:#fff; background:var(--danger);}
  .todaybar{display:flex; align-items:center; gap:10px; margin:10px 14px 2px; padding:11px 14px; background:#FCF6EE; border:1.5px solid #EADFCB; border-radius:13px; font-weight:800; font-size:14px;}
  .todaybar .tb-n{color:var(--ink3); font-size:12px; font-weight:700;}
  .todaybar .tb-seg{margin-left:0; font-size:12px; font-weight:700; color:var(--ink2); display:inline-flex; align-items:center; gap:5px;}
  .todaybar .tb-seg:first-of-type{margin-left:auto;}
  .todaybar .tb-seg i{width:8px; height:8px; border-radius:50%;}
  .todaybar .tb-seg i.plan{background:#4E7C8E;} .todaybar .tb-seg i.short{background:var(--danger);}
  .av-un{width:24px; height:24px; border-radius:50%; background:#EDE6D9; color:var(--ink3); display:inline-flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex:none;}

  /* 依時段 */
  .bandc{margin:9px 14px; background:#fff; border-radius:16px; box-shadow:0 2px 8px rgba(79,74,67,.07); overflow:hidden;}
  .bandc-h{display:flex; align-items:center; gap:9px; padding:12px 13px 10px; font-weight:800; font-size:15px;}
  .bandc-h .bar{width:5px; height:19px; border-radius:3px;}
  .bandc-h .t{font-weight:600; color:var(--ink3); font-size:12px;}
  .bandc-h .meta{margin-left:auto; font-size:11px; color:var(--ink3); font-weight:700;}
  .bandc-body{padding:2px 12px 12px; display:flex; flex-wrap:wrap; gap:8px; min-height:44px;}

  /* 依人 */
  .prow{display:flex; gap:11px; background:#fff; border-radius:16px; padding:11px; margin:9px 14px; box-shadow:0 2px 8px rgba(79,74,67,.07);}
  .who{width:56px; flex:none; display:flex; flex-direction:column; align-items:center; gap:2px; border-right:1px solid #F1ECE3; padding-right:9px;}
  .who img{width:44px; height:44px; object-fit:contain;} .who .av-un{width:44px; height:44px; font-size:18px;} .who .pn{font-size:13px; font-weight:800;}
  .tasks{flex:1; display:flex; flex-wrap:wrap; gap:8px; align-content:flex-start; min-height:44px;}
  .pmeta-r{width:100%; display:flex; justify-content:flex-end; align-items:center; gap:10px; flex-wrap:wrap; margin-top:4px;}
  .pcount{font-size:11px; color:var(--ink3); font-weight:800;}
  .bm{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:800; color:var(--ink2); font-variant-numeric:tabular-nums;}
  .bm i{width:9px; height:9px; border-radius:2px;}

  .footwrap{margin:12px 14px 2px; display:flex; flex-direction:column; gap:9px;}
  .addbtn{width:100%; background:#fff; border:1.5px dashed var(--accent); color:var(--accent); border-radius:13px; padding:13px; font-size:15px; font-weight:800;}
  .linebtn{width:100%; background:#06C755; color:#fff; border:none; border-radius:13px; padding:15px; font-size:16px; font-weight:800;}
  .linebtn .s{display:block; font-size:11px; font-weight:700; opacity:.9; margin-top:2px;}

  .ghost{opacity:.28;} .dragging{position:fixed; z-index:999; pointer-events:none; box-shadow:0 12px 26px rgba(79,74,67,.3); transform:scale(1.05);}
  .over{outline:2px dashed var(--pre); outline-offset:3px; border-radius:14px;}

  /* sheet */
  #sheet{position:fixed; inset:0; display:none; z-index:50;} #sheet.on{display:block;}
  .sheet-bd{position:absolute; inset:0; background:rgba(43,40,36,.32);}
  .sheet-card{position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:100%; max-width:680px; background:var(--bg); border-radius:20px 20px 0 0; padding:16px 16px calc(18px + env(safe-area-inset-bottom)); box-shadow:0 -8px 30px rgba(0,0,0,.18);}
  .sheet-title{font-size:17px; font-weight:800; text-align:center;}
  .sheet-label{font-size:11px; color:var(--ink3); font-weight:800; margin:13px 2px 8px;}
  .bandpick{display:flex; gap:8px;}
  .bandpick b{flex:1; text-align:center; padding:13px 4px; border-radius:12px; font-size:14px; font-weight:800; background:#fff; border:1.5px solid var(--line); color:var(--ink2); display:inline-flex; align-items:center; justify-content:center; gap:6px;}
  .bandpick b.on{border-color:var(--ink); color:var(--ink); box-shadow:0 0 0 2px rgba(79,74,67,.08);}
  .bandpick .dot{width:10px; height:10px; border-radius:3px;}
  .sheet-row{display:flex; align-items:center; justify-content:space-between; margin-top:14px; background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; font-weight:800; font-size:14px;}
  .tg{width:46px; height:26px; border-radius:14px; background:#DDD5C8; position:relative; flex:none;}
  .tg.on{background:var(--mid);} .tg i{position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:2px; left:2px; transition:left .15s;} .tg.on i{left:22px;} .tg.danger.on{background:var(--lack);}
  .sheet-actions{display:flex; gap:10px; margin-top:14px;}
  .sheet-actions button{flex:1; border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:800;}
  .b-done{background:var(--ink); color:#fff;} .b-close{background:#EEE7DC; color:var(--ink2);}
  .ar{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid #F1ECE3;}
  .ar img{width:34px; height:34px; object-fit:contain;} .ar .arn{font-weight:800; font-size:15px;} .ar .tg{margin-left:auto;}
  .arlist{max-height:48vh; overflow:auto; margin-top:8px;}

  /* 後台 */
  .card{background:var(--surface); border-radius:16px; box-shadow:0 2px 8px rgba(79,74,67,.07); margin:10px 14px; padding:14px;}
  .card-h{font-size:12px; font-weight:800; color:var(--accent); margin-bottom:12px;}
  .field{margin-bottom:13px;} .flabel{font-size:11px; color:var(--ink3); font-weight:800; margin-bottom:5px;}
  .finput{background:#FBF8F2; border:1.5px solid var(--line); border-radius:10px; padding:11px 12px; font-size:15px; font-weight:700; display:flex; align-items:center;}
  .finput .suffix{margin-left:auto; color:var(--ink3); font-size:12px;}
  .segc{display:flex; flex-wrap:wrap; background:#EEE7DC; border-radius:9px; padding:3px; gap:2px;}
  .segc b{padding:8px 13px; border-radius:7px; font-size:13px; font-weight:800; color:var(--ink2); display:inline-flex; align-items:center; gap:6px;}
  .segc b.on{background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(79,74,67,.12);}
  .segc .dot{width:9px; height:9px; border-radius:3px;}
  .wkrow{display:flex; gap:6px;}
  .wkrow .wd{flex:1; text-align:center; padding:9px 0; border-radius:9px; border:1.5px solid var(--line); background:#fff; font-size:13px; font-weight:800; color:var(--ink3);}
  .wkrow .wd.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .wkrow.muted{opacity:.4; pointer-events:none;}
  .it .catdot{width:7px; height:7px; border-radius:2px; flex:none; margin-left:6px;}
  .row2{display:flex; gap:12px;} .row2 .field{flex:1;}
  .tgwrap{display:flex; align-items:center; justify-content:space-between;}
  .save{display:block; width:100%; margin-top:4px; background:var(--ink); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800;}
  .ah{font-size:13px; font-weight:800; color:var(--ink2); margin:14px 18px 8px; display:flex; align-items:center; gap:7px;}
  .it{display:flex; align-items:center; gap:10px; background:#fff; border:1.5px solid #F1ECE3; border-radius:12px; padding:11px 12px; margin:0 14px 8px;}
  .it.sel{border-color:var(--accent); box-shadow:0 0 0 2px rgba(191,91,61,.12);}
  .it .blk{width:5px; height:20px; border-radius:3px; flex:none;} .it .nm{font-weight:800; font-size:15px;}
  .it .meta{margin-left:auto; font-size:11px; color:var(--ink3); font-weight:700;}
  .it .off{color:var(--ink3); font-weight:800; font-size:11px; background:#F0ECE3; padding:2px 7px; border-radius:6px; margin-left:6px;}
  .strow{display:flex; align-items:center; gap:11px; background:#fff; border:1.5px solid #F1ECE3; border-radius:13px; padding:10px 12px; margin:0 14px 8px;}
  .strow img{width:40px; height:40px; object-fit:contain;} .strow .nm{font-weight:800; font-size:15px;} .strow .an{font-size:11px; color:var(--ink3); font-weight:700;}
  .strow .aicChip{width:36px; height:36px; border-radius:10px; background:var(--tint); display:inline-flex; align-items:center; justify-content:center;}
  .strow .sp{margin-left:auto; display:flex; align-items:center; gap:6px;}
  .ord{background:var(--tint); border:none; border-radius:7px; width:28px; height:28px; font-size:14px; font-weight:800; color:var(--ink2);}
  .bandcfg{display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid #F1ECE3; border-radius:13px; padding:12px; margin:0 14px 8px;}
  .bandcfg .sw3{width:8px; height:30px; border-radius:4px;} .bandcfg .bn{font-size:15px; font-weight:800;} .bandcfg .bt{font-size:12px; color:var(--ink3); font-weight:700; margin-top:2px;}
  .bandcfg .lock{margin-left:auto; font-size:10px; color:var(--ink3); font-weight:800; background:#F0ECE3; padding:3px 8px; border-radius:7px;}
  .setup{margin:10px 14px; padding:11px 13px; background:#FFF6E9; border:1px solid #F0D9AE; border-radius:12px; font-size:11px; color:#8a6d3b; line-height:1.6;}

  /* ===== 盤點頂部：今日 + 明日備料提醒 ===== */
  .ctop{padding:8px 14px 2px;}
  .ctoprow{display:flex; align-items:baseline; gap:7px; padding:0 2px 9px;}
  .ctoprow .tl{font-size:12px; font-weight:800; color:var(--ink3);}
  .ctoprow .td{font-size:15px; font-weight:800; color:var(--ink);}
  .ctoprow .td .m{font-family:"DM Mono",monospace; font-weight:500;}
  .ctoprow .ebtn{margin-left:auto; display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:800; border-radius:10px; padding:7px 13px; border:1.5px solid var(--line); background:#fff; color:var(--ink2);}
  .ctoprow .ebtn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .remind{display:flex; align-items:center; gap:11px; border-radius:14px; padding:11px 13px; border:1.5px solid var(--line); background:var(--surface);}
  .remind.hol{border-color:rgba(191,91,61,.35); background:#FBF1EC;}
  .remind .rico{width:34px; height:34px; border-radius:10px; flex:none; display:flex; align-items:center; justify-content:center; background:var(--tint); color:var(--ink2);}
  .remind.hol .rico{background:rgba(191,91,61,.13); color:var(--accent);}
  .remind .rico svg{width:19px; height:19px;}
  .remind .rb{min-width:0; flex:1;}
  .remind .rl{font-size:11px; font-weight:800; color:var(--ink3); letter-spacing:.5px;}
  .remind .rm{font-size:16px; font-weight:800; color:var(--ink); margin-top:2px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .remind .rm .m{font-family:"DM Mono",monospace; font-weight:500;}
  .remind .rh{font-size:11.5px; font-weight:700; margin-top:3px;}
  .remind.hol .rh{color:var(--accent);} .remind .rh{color:var(--ink3);}
  .daychip{font-size:12px; font-weight:800; border-radius:7px; padding:3px 9px;}
  .dc-wk{background:var(--tint); color:var(--ink2);}
  .dc-ph{background:rgba(244,197,67,.22); color:#9a7b1e;}
  .dc-hol{background:var(--accent); color:#fff;}
  .dtedit{margin-left:auto; font-size:11px; font-weight:800; color:var(--ink2); background:var(--tint); border:none; border-radius:8px; padding:6px 10px; flex:none;}
  .dtpick{display:flex; gap:6px; margin-top:9px; flex-wrap:wrap;}
  .dtpick b{font-size:12px; font-weight:800; padding:7px 11px; border-radius:9px; background:#fff; border:1.5px solid var(--line); color:var(--ink2);}
  .dtpick b.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .dtmark{font-size:10px; font-weight:800; color:var(--accent); margin-left:2px;}

  /* ===== A 編輯模式：卡片可編輯 ===== */
  .ccard.ed{border-style:dashed; border-color:var(--ink3); box-shadow:none;}
  .edhead{display:flex; align-items:center; gap:8px;}
  .edhead .drag{display:flex; flex-direction:column; gap:2px; flex:none;}
  .edhead .drag button{border:none; background:var(--tint); color:var(--ink2); width:26px; height:20px; border-radius:6px; font-size:11px; font-weight:800; line-height:1; padding:0;}
  .edhead .ednm{font-size:16px; font-weight:800; flex:1; min-width:0; line-height:1.25; display:flex; align-items:center; gap:5px;}
  .edhead .ednm .pen{color:var(--ink3); flex:none;} .edhead .ednm .pen svg{width:13px; height:13px; vertical-align:-2px;}
  .edhead .delb{border:1.5px solid var(--danger-line); background:#fff; color:var(--danger); border-radius:9px; width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; flex:none;}
  .edhead .delb svg{width:15px; height:15px;}
  .edrow{display:flex; align-items:center; gap:7px; margin-top:10px; flex-wrap:wrap;}
  .efield{display:inline-flex; align-items:center; gap:6px; border:1.5px solid var(--line); background:#fff; border-radius:9px; padding:5px 9px;}
  .efield .fl{color:var(--ink3); font-size:10px; font-weight:800;}
  .efield .fv{font-family:"DM Mono",monospace; color:var(--ink); font-size:13px; font-weight:500;}
  .efield .fu{color:var(--ink2); font-size:12px; font-weight:700;}
  .stepm{display:inline-flex; align-items:center; border:1.5px solid var(--line); border-radius:9px; background:#fff; overflow:hidden;}
  .stepm button{border:none; background:none; width:27px; height:28px; font-size:16px; color:var(--ink2); font-weight:800;}
  .stepm .v{min-width:22px; text-align:center; font-family:"DM Mono",monospace; font-size:13px; font-weight:500;}
  .tgm{width:38px; height:23px; border-radius:12px; background:var(--ok); position:relative; flex:none;}
  .tgm i{position:absolute; top:3px; left:18px; width:17px; height:17px; border-radius:50%; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .tgm.off{background:var(--line);} .tgm.off i{left:3px;}
  .addrow{display:flex; align-items:center; justify-content:center; gap:6px; border:1.5px dashed var(--line); border-radius:12px; padding:11px; font-size:13px; font-weight:800; color:var(--ink2); background:rgba(255,255,255,.4); margin-bottom:8px;}
  .cols.editing{grid-template-columns:1fr;}

  /* 後台 刪除品項 */
  .delitem{margin:2px 0 0; width:100%; border:1.5px solid var(--danger-line); background:var(--danger-bg); color:var(--danger); border-radius:11px; padding:11px; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:7px;}
  .delitem svg{width:15px; height:15px;}
</style>

<body>
<div class="app">
  <div class="head"><div class="title" id="hTitle">庄腳・收班工作分配</div><div class="sub" id="hSub"></div></div>

  <!-- 盤點 -->
  <div class="page" id="page-count">
    <div class="ctop" id="countTop"></div>
    <div class="hint">料夠不用動；不足按開關調目前量。完成後按下方「產生工作任務」</div>
    <div class="cols" id="countCols"></div>
    <button class="bigbtn" onclick="genTasks()">產生工作任務 →</button>
  </div>

  <!-- 分配 -->
  <div class="page" id="page-board">
    <div class="seg"><div class="segb" id="segT" onclick="setV('time')">依時段</div><div class="segb" id="segP" onclick="setV('people')">依人</div><div class="segb" id="segC" onclick="setV('cat')">依分類</div></div>
    <div class="attend" id="attend"></div>
    <div class="key">
      <div class="kc lk"><span class="sw2"><span>急</span><span>缺</span></span><span><div class="ku">急缺</div><div class="kn">無庫存</div></span></div>
      <div class="kc"><span class="sw2" style="background:var(--pre)"></span><span><div class="ku">開班前</div><div class="kn">最急</div></span></div>
      <div class="kc"><span class="sw2" style="background:var(--am)"></span><span><div class="ku">早段</div><div class="kn">6:30–10:00</div></span></div>
      <div class="kc"><span class="sw2" style="background:var(--mid)"></span><span><div class="ku">午段</div><div class="kn">10:00–打烊</div></span></div>
    </div>
    <div class="hint" id="boardTip"></div>
    <div id="stage"></div>
    <div class="footwrap">
      <button class="addbtn" onclick="addTask()">＋ 新增任務</button>
      <button class="linebtn" onclick="sendLine()">傳送至 LINE<span class="s">推送到煮茶群</span></button>
    </div>
  </div>

  <!-- 後台 -->
  <div class="page" id="page-admin">
    <div class="seg">
      <div class="segb" id="tI" onclick="setT('I')">品項</div>
      <div class="segb" id="tS" onclick="setT('S')">員工</div>
      <div class="segb" id="tA" onclick="setT('A')">工作區</div>
      <div class="segb" id="tB" onclick="setT('B')">時段</div>
    </div>
    <div class="page on" id="aI">
      <button class="addbtn" style="margin:12px 14px 2px" onclick="addItem()">＋ 新增品項</button>
      <div class="card"><div class="card-h">編輯品項</div>
        <div class="field"><div class="flabel">品名</div><div class="finput" id="ef-name" onclick="editField('name')"></div></div>
        <div class="field"><div class="flabel">工作區</div><div class="segc" id="ef-area"></div></div>
        <div class="field"><div class="flabel">種類</div><div class="segc" id="ef-cat"></div></div>
        <div class="row2">
          <div class="field"><div class="flabel">單位</div><div class="finput" id="ef-unit" onclick="editField('unit')"></div></div>
          <div class="field"><div class="flabel">標準量</div><div class="finput" id="ef-std" onclick="editField('std')"></div></div>
          <div class="field"><div class="flabel">預估</div><div class="finput" id="ef-min" onclick="editField('min')"></div></div>
        </div>
        <div class="field"><div class="flabel">建議時段（選填）</div>
          <div class="segc" id="ef-band">
            <b data-b="none">待排</b><b data-b="pre"><span class="dot" style="background:var(--pre)"></span>開班前</b>
            <b data-b="am"><span class="dot" style="background:var(--am)"></span>早段</b><b data-b="mid"><span class="dot" style="background:var(--mid)"></span>午段</b>
          </div></div>
        <div class="field"><div class="tgwrap"><div class="flabel" style="margin:0">每日必備</div><div class="tg" id="ef-daily" onclick="toggleField('daily')"><i></i></div></div></div>
        <div class="field"><div class="flabel">排定週幾（每日必備可不設）</div><div class="wkrow" id="ef-days"></div></div>
        <div class="field"><div class="tgwrap"><div class="flabel" style="margin:0">啟用</div><div class="tg" id="ef-on" onclick="toggleField('enabled')"><i></i></div></div></div>
        <button class="delitem" onclick="delItem()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>刪除這個品項</button>
      </div>
      <div class="hint">點下方品項載入編輯；變更即存</div>
      <div id="itemlist"></div>
    </div>
    <div class="page" id="aS"><button class="addbtn" style="margin:12px 14px 2px" onclick="addStaff()">＋ 新增員工</button><div id="stafflist"></div></div>
    <div class="page" id="aA"><button class="addbtn" style="margin:12px 14px 2px" onclick="addArea()">＋ 新增工作區</button><div id="arealist"></div></div>
    <div class="page" id="aB"><div class="hint" style="text-align:left;padding:12px 18px 4px">名稱可改（點一下），顏色鎖定</div><div id="bandlist"></div></div>
    <div class="setup" id="setup"></div>
  </div>
</div>

  <button id="nBoard" onclick="go('board')"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="14" rx="2.5"/><path d="M9 5.3 V18.7"/><path d="M15 5.3 V18.7"/></svg></span><span class="lab">工作分配</span></button>

</div>

var DB=null, useFB=!!(FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.indexOf('http')===0), fbRef=null;
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function applyData(v){
  if(!v||!v.items){ DB=clone(DEFAULT); DB.days={}; }
  else { DB=v; ['areas','bands','staff','items'].forEach(function(k){ if(!DB[k]) DB[k]=clone(DEFAULT[k]); }); if(!DB.days)DB.days={}; }
  // 舊資料相容：補上種類(cat)與排定週幾(days)
  (DB.items||[]).forEach(function(it){ var d=DEFAULT.items.filter(function(x){return x.name===it.name;})[0];
    if(it.cat===undefined||it.cat===null) it.cat = d?d.cat:'';
    if(!Array.isArray(it.days)) it.days = d?clone(d.days):[]; });
  var t=todayStr();
  if(!DB.days[t]) DB.days[t]={working:DB.staff.filter(function(s){return s.enabled;}).map(function(s){return s.name;}), counts:{}, tasks:[]};
  if(!DB.dayType) DB.dayType={};
  DB.cur=t;
}
function day(){ return DB.days[DB.cur]; }
function todayDOW(){ var c=DB.cur; if(c){ var p=c.split('-'); return new Date(+p[0],+p[1]-1,+p[2]).getDay(); } return new Date().getDay(); }
function dueToday(it){ return !!(it&&it.daily) || (it&&Array.isArray(it.days)&&it.days.indexOf(todayDOW())>=0); }
function taskCat(t){ var it=itemBy(t.name); return it?(it.cat||''):(t.cat||''); }
function taskSrc(t){ var it=itemBy(t.name); if(dueToday(it)) return 'plan'; if(t.stock==='out'||(it&&curOf(t.name)<it.std)) return 'short'; return 'plan'; }
function save(){ if(useFB&&fbRef){ try{fbRef.set(DB);}catch(e){} } lsSet('jenka-shouban', JSON.stringify(DB)); }
function load(cb){
  if(useFB){ try{ firebase.initializeApp(FIREBASE_CONFIG); fbRef=firebase.database().ref('jenka-shouban');
      fbRef.once('value').then(function(s){ applyData(s.val()); cb(); }).catch(function(){ applyData(JSON.parse(lsGet('jenka-shouban')||'null')); cb(); }); return;
    }catch(e){} }
  applyData(JSON.parse(lsGet('jenka-shouban')||'null')); cb();
}

/* ====== 盤點 ====== */
function curOf(name){ var c=day().counts; var it=itemBy(name); return (c[name]!=null)?c[name]:(it?it.std:0); }
function itemBy(name){ for(var i=0;i<DB.items.length;i++){ if(DB.items[i].name===name) return DB.items[i]; } return null; }
function cToggle(name){ var it=itemBy(name); var low=curOf(name)<it.std; day().counts[name]= low? it.std : 0; save(); renderCount(); }
function cBump(name,d){ var it=itemBy(name); var v=(day().counts[name]!=null?day().counts[name]:it.std); day().counts[name]=Math.max(0,Math.round((v+d)*2)/2); save(); renderCount(); }
/* ====== 日期 / 明日類別（沿用煮茶對照：日六=假日、一=平假日、二~五=平日） ====== */
var TIERMAP={0:'hol',1:'ph',2:'wk',3:'wk',4:'wk',5:'wk',6:'hol'};
var TIERNAME={wk:'平日',ph:'平假日',hol:'假日'};
var WDL=['日','一','二','三','四','五','六'];
function datePlus(key,n){ var p=String(key).split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function dInfo(key){ var p=String(key).split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]); return {m:d.getMonth()+1,dd:d.getDate(),wi:d.getDay(),wd:WDL[d.getDay()]}; }
function dayTypeOf(key){ if(DB.dayType&&DB.dayType[key]) return DB.dayType[key]; return TIERMAP[dInfo(key).wi]||'wk'; }
function setDT(key,t){ if(!DB.dayType)DB.dayType={}; if(t==='auto'){ delete DB.dayType[key]; } else { DB.dayType[key]=t; } dtOpen=false; save(); renderCountTop(); }

function eMove(i,dir){ var area=DB.items[i].area; var j=i+dir; while(j>=0&&j<DB.items.length&&DB.items[j].area!==area){ j+=dir; }
  if(j<0||j>=DB.items.length||DB.items[j].area!==area) return; var t=DB.items[i]; DB.items[i]=DB.items[j]; DB.items[j]=t; save(); renderCount(); }
function eRename(i){ var it=DB.items[i], old=it.name; var n=prompt('修改品名', old); if(n===null)return; n=(''+n).trim(); if(!n||n===old)return;
  if(DB.items.some(function(x,k){return k!==i&&x.name===n;})){ alert('已有同名品項'); return; }
  it.name=n; Object.keys(DB.days).forEach(function(dk){ var D=DB.days[dk];
    if(D.counts&&D.counts[old]!=null){ D.counts[n]=D.counts[old]; delete D.counts[old]; }
    if(D.tasks) D.tasks.forEach(function(t){ if(t.name===old) t.name=n; }); });
  save(); renderCount(); }
function eStd(i,d){ var it=DB.items[i]; it.std=Math.max(0,Math.round(((+it.std||0)+d)*2)/2); save(); renderCount(); }
function eUnit(i){ var it=DB.items[i]; var v=prompt('修改單位', it.unit); if(v===null)return; v=(''+v).trim(); if(v) it.unit=v; save(); renderCount(); }
function eDaily(i){ DB.items[i].daily=!DB.items[i].daily; save(); renderCount(); }
function eEnabled(i){ DB.items[i].enabled = DB.items[i].enabled===false; save(); renderCount(); }
function eDel(i){ var it=DB.items[i]; if(!confirm('刪除「'+it.name+'」？此動作無法復原。')) return; DB.items.splice(i,1); save(); renderCount(); }
function eAdd(area){ var n=prompt('新增品項到「'+area+'區」\n品名'); if(n===null)return; n=(''+n).trim(); if(!n)return;
  if(DB.items.some(function(x){return x.name===n;})){ alert('已有同名品項'); return; }
  DB.items.push({name:n,area:area,unit:'份',std:1,min:10,band:'none',daily:false,enabled:true,cat:'',days:[]}); save(); renderCount(); }

function genTasks(){
  var D=day(), added=0;
  DB.items.forEach(function(it){
    if(!it.enabled) return;
    var cur=curOf(it.name), low=cur<it.std;
    if(!(low||dueToday(it))) return;
    if(D.tasks.some(function(t){return t.name===it.name;})) return;
    var out=(cur<=0);
    D.tasks.push({id:'t'+Date.now()+'_'+(added),name:it.name,owner:'未指派',band:out?'pre':(it.band||'none'),min:it.min,stock:out?'out':'ok',done:false,cat:it.cat||''});
    added++;
  });
  save(); 
  alert('已產生 '+added+' 項任務（今天排定＋盤點不足）。可到「工作分配」指派。');
  go('board');
}

var V='time';
function renderTime(){
  var D=day();
  var list=[{key:'none',name:'待排時段',t:'尚未排定，拖進下方時段'},{key:'pre',name:BNAME.pre,t:'最急'},{key:'am',name:BNAME.am,t:'6:30–10:00'},{key:'mid',name:BNAME.mid,t:'10:00–打烊'}];
  return list.map(function(b){
    var ts=D.tasks.filter(function(it){return it.band===b.key;});
    var tot=ts.reduce(function(a,c){return a+(c.min||0);},0);
    var chips=ts.map(function(it){
      return '<div class="chip'+(it.done?' done':'')+'" data-id="'+it.id+'">'+lackTag(it)+(isWorking(it.owner)?'<img class="av" src="'+AV[animalOf(it.owner)]+'">':'<span class="av-un">?</span>')+it.name+'<span class="cm">'+it.min+'分</span></div>';
    }).join('');
    return '<div class="bandc"><div class="bandc-h"><span class="bar" style="background:'+bvar(b.key)+'"></span>'+b.name+' <span class="t">'+b.t+'</span><span class="meta">'+ts.length+'項 · 約'+tot+'分</span></div><div class="bandc-body" data-zone="band:'+b.key+'">'+chips+'</div></div>';
  }).join('');
}
function rowFromTasks(label,ts,isUn){
  ts=ts.slice().sort(function(a,c){return BORDER.indexOf(a.band)-BORDER.indexOf(c.band);});
  var sum={none:0,pre:0,am:0,mid:0}; ts.forEach(function(it){sum[it.band]=(sum[it.band]||0)+(it.min||0);});
  var chips=ts.map(function(it){ return '<div class="chip'+(it.done?' done':'')+'" data-id="'+it.id+'">'+lackTag(it)+(it.band==='none'?'':'<span class="blk" style="background:'+bvar(it.band)+'"></span>')+it.name+'<span class="cm">'+it.min+'分</span></div>'; }).join('');
  var parts=BORDER.filter(function(b){return sum[b]>0;}).map(function(b){ if(b==='none')return '<span class="bm" style="color:var(--ink3)">待排'+sum[b]+'分</span>'; return '<span class="bm"><i style="background:'+bvar(b)+'"></i>'+sum[b]+'</span>'; }).join('');
  var who=isUn?'<span class="av-un">?</span>':avImg(label,'');
  var zone=isUn?'未指派':label;
  return '<div class="prow"><div class="who">'+who+'<span class="pn">'+label+'</span></div><div class="tasks" data-zone="owner:'+zone+'">'+chips+'<div class="pmeta-r"><span class="pcount">'+ts.length+'項</span>'+parts+'</div></div></div>';
}
function renderPeople(){
  var D=day();
  var order=DB.staff.map(function(s){return s.name;});
  var out=order.filter(isWorking).map(function(pn){ return rowFromTasks(pn, D.tasks.filter(function(it){return it.owner===pn;}), false); }).join('');
  var un=D.tasks.filter(function(it){return !isWorking(it.owner);});
  if(un.length) out+=rowFromTasks('未指派',un,true);
  return out;
}
function renderBoard(){ document.getElementById('stage').innerHTML = V==='time'?renderTime():V==='people'?renderPeople():renderCat(); renderAttend(); }
function catChip(it){ var s=taskSrc(it); var stag=s==='short'?'<span class="stag short">臨時</span>':'<span class="stag plan">排定</span>';
  return '<div class="chip'+(it.done?' done':'')+'" data-id="'+it.id+'">'+lackTag(it)+stag+(isWorking(it.owner)?'<img class="av" src="'+AV[animalOf(it.owner)]+'">':'<span class="av-un">?</span>')+it.name+'<span class="cm">'+it.min+'分</span></div>'; }
function renderCat(){
  var D=day(), plan=0, shrt=0;
  D.tasks.forEach(function(t){ if(taskSrc(t)==='short') shrt++; else plan++; });
  var head='<div class="todaybar"><span class="tb-t">今日待備</span><span class="tb-n">'+D.tasks.length+'項</span><span class="tb-seg"><i class="plan"></i>排定 '+plan+'</span><span class="tb-seg"><i class="short"></i>臨時 '+shrt+'</span></div>';
  if(!D.tasks.length) return head+'<div class="hint" style="padding:18px">尚未產生任務。先到「盤點」按產生任務。</div>';
  var lanes=CATS.map(function(c){
    var ts=D.tasks.filter(function(t){return taskCat(t)===c;}); if(!ts.length) return '';
    var tot=ts.reduce(function(a,x){return a+(x.min||0);},0);
    return '<div class="bandc"><div class="bandc-h"><span class="bar" style="background:'+catColor(c)+'"></span>'+c+'<span class="meta">'+ts.length+'項 · 約'+tot+'分</span></div><div class="bandc-body">'+ts.map(catChip).join('')+'</div></div>';
  }).join('');
  var unc=D.tasks.filter(function(t){return CATS.indexOf(taskCat(t))<0;});
  if(unc.length) lanes+='<div class="bandc"><div class="bandc-h"><span class="bar" style="background:var(--ink3)"></span>未分類<span class="meta">'+unc.length+'項</span></div><div class="bandc-body">'+unc.map(catChip).join('')+'</div></div>';
  return head+lanes;
}
function setV(v){ V=v; document.getElementById('segT').classList.toggle('on',v==='time'); document.getElementById('segP').classList.toggle('on',v==='people'); document.getElementById('segC').classList.toggle('on',v==='cat');
  document.getElementById('boardTip').textContent = v==='time'?'拖待排卡進時段＝排定；長按設定時段/急缺；輕點完成':v==='people'?'拖卡改負責人；長按設定時段/急缺；輕點完成':'依種類分欄總覽；標籤：排定＝今天輪到、臨時＝盤點不足。輕點完成、長按可調'; renderBoard(); }
function byId(id){ var t=day().tasks; for(var i=0;i<t.length;i++){ if(t[i].id===id) return t[i]; } return null; }

/* attend */
function renderAttend(){ var order=DB.staff.map(function(s){return s.name;});
  var avs=order.filter(isWorking).map(function(pn){return '<img src="'+AV[animalOf(pn)]+'">';}).join('');
  document.getElementById('attend').innerHTML='<span class="al">今天上班 '+day().working.length+' 人</span>'+avs+'<button class="aedit" onclick="openAttend()">編輯</button>';
}
function openAttend(){ document.getElementById('sheet').classList.add('on');
  var rows=DB.staff.map(function(s){ return '<div class="ar"><img src="'+AV[s.animal]+'"><span class="arn">'+s.name+'</span><div class="tg'+(isWorking(s.name)?' on':'')+'" onclick="toggleWork(\''+s.name+'\')"><i></i></div></div>'; }).join('');
  document.getElementById('sheet').innerHTML='<div class="sheet-bd" onclick="closeSheet()"></div><div class="sheet-card"><div class="sheet-title">今天上班</div><div class="sheet-label">缺勤者不顯示，任務自動轉「未指派」</div><div class="arlist">'+rows+'</div><div class="sheet-actions"><button class="b-done" onclick="closeSheet()">完成</button></div></div>';
}
function toggleWork(n){ var w=day().working, i=w.indexOf(n); if(i>=0)w.splice(i,1); else w.push(n); save(); renderBoard(); openAttend(); }

/* task sheet (long-press) */
var sheetId=null;
function openSheet(id){ sheetId=id; renderSheet(); document.getElementById('sheet').classList.add('on'); }
function closeSheet(){ document.getElementById('sheet').classList.remove('on'); sheetId=null; }
function renderSheet(){ var it=byId(sheetId); if(!it)return;
  var bs=[{k:'none',n:'待排'},{k:'pre',n:'開班前'},{k:'am',n:'早段'},{k:'mid',n:'午段'}];
  var picks=bs.map(function(b){ var dot=b.k==='none'?'':'<span class="dot" style="background:'+bvar(b.k)+'"></span>'; return '<b class="'+(it.band===b.k?'on':'')+'" onclick="setBand(\''+b.k+'\')">'+dot+b.n+'</b>'; }).join('');
  document.getElementById('sheet').innerHTML='<div class="sheet-bd" onclick="closeSheet()"></div><div class="sheet-card"><div class="sheet-title">'+it.name+'</div><div class="sheet-label">時段</div><div class="bandpick">'+picks+'</div><div class="sheet-row"><span>急缺（無庫存・必補）</span><div class="tg danger'+(it.stock==='out'?' on':'')+'" onclick="toggleLack()"><i></i></div></div><div class="sheet-actions"><button class="b-close" onclick="closeSheet()">關閉</button><button class="b-done" onclick="sheetDone()">'+(it.done?'取消完成':'標完成')+'</button></div></div>';
}
function setBand(b){ var it=byId(sheetId); it.band=b; save(); renderBoard(); renderSheet(); }
function toggleLack(){ var it=byId(sheetId); if(it.stock==='out'){it.stock='ok';}else{it.stock='out'; it.band='pre';} save(); renderBoard(); renderSheet(); }
function sheetDone(){ var it=byId(sheetId); it.done=!it.done; save(); renderBoard(); closeSheet(); }

/* add task / send line */
function addTask(){ var n=prompt('新增任務名稱'); if(!n)return; var m=parseInt(prompt('預估幾分鐘？','10'),10); day().tasks.push({id:'t'+Date.now(),name:n,owner:'未指派',band:'none',min:isNaN(m)?10:m,stock:'ok',done:false}); save(); renderBoard(); }
function sendLine(){ if(!confirm('將目前分工以「以人為主」圖卡推送到煮茶群？\n（可先調整內容再送）')) return;
  if(GAS_ENDPOINT){ try{ fetch(GAS_ENDPOINT,{method:'POST',body:JSON.stringify({type:'assign',date:DB.cur,tasks:day().tasks,staff:DB.staff,working:day().working,secret:'jenka-tea-push'})}); alert('已送出到煮茶群'); }catch(e){ alert('送出失敗：'+e); } }
  else { alert('已送出到煮茶群（示意；填入 GAS_ENDPOINT 後實際推送）'); }
}

/* drag */
var drag=null,start=null,lpTimer=null,lpFired=false;
function bindDrag(){ var stage=document.getElementById('stage');
  stage.addEventListener('pointerdown',function(e){ var el=e.target.closest('.chip'); if(!el)return;
    start={id:el.dataset.id,x:e.clientX,y:e.clientY,el:el,moved:false}; lpFired=false;
    lpTimer=setTimeout(function(){ lpFired=true; openSheet(start.id); },420);
    document.addEventListener('pointermove',onMove); document.addEventListener('pointerup',onUp); document.addEventListener('pointercancel',onUp); });
}
function begin(e){ var el=start.el,r=el.getBoundingClientRect(),c=el.cloneNode(true); c.classList.add('dragging'); c.style.width=r.width+'px'; c.style.left=r.left+'px'; c.style.top=r.top+'px'; document.body.appendChild(c); el.classList.add('ghost'); drag={id:start.id,clone:c,dx:e.clientX-r.left,dy:e.clientY-r.top}; }
function onMove(e){ if(!start||lpFired)return; if(!drag){ if(Math.abs(e.clientX-start.x)+Math.abs(e.clientY-start.y)>6){start.moved=true; clearTimeout(lpTimer); begin(e);} else return; }
  drag.clone.style.left=(e.clientX-drag.dx)+'px'; drag.clone.style.top=(e.clientY-drag.dy)+'px';
  var o=zoneUnder(e.clientX,e.clientY),z=document.querySelectorAll('[data-zone]'); for(var i=0;i<z.length;i++) z[i].classList.toggle('over',z[i].dataset.zone===o); }
function zoneUnder(x,y){ drag.clone.style.display='none'; var el=document.elementFromPoint(x,y); drag.clone.style.display=''; var z=el&&el.closest('[data-zone]'); return z?z.dataset.zone:null; }
function onUp(e){ document.removeEventListener('pointermove',onMove); document.removeEventListener('pointerup',onUp); document.removeEventListener('pointercancel',onUp); clearTimeout(lpTimer);
  if(lpFired){ start=null; return; }
  if(drag){ var o=zoneUnder(e.clientX,e.clientY); if(o){ var it=byId(drag.id),p=o.split(':'); if(it){ if(p[0]==='band') it.band=p[1]; else if(p[0]==='owner') it.owner=p[1]; } }
    document.querySelectorAll('.over').forEach(function(z){z.classList.remove('over');}); drag.clone.remove(); drag=null; start=null; save(); renderBoard(); return; }
  if(start&&!start.moved){ var t=byId(start.id); if(t){ t.done=!t.done; save(); renderBoard(); } } start=null;
}

/* ====== 後台 ====== */
var T='I', sel=0;
var CATS=['蔬菜備料','餡料備品','肉類醃製','醬料','點貨'];
var WD=[{n:'一',d:1},{n:'二',d:2},{n:'三',d:3},{n:'四',d:4},{n:'五',d:5},{n:'六',d:6},{n:'日',d:0}];
function catColor(c){ return c==='蔬菜備料'?'var(--bread)':c==='餡料備品'?'var(--mid)':c==='肉類醃製'?'var(--grill)':c==='醬料'?'#B6863C':c==='點貨'?'var(--drink)':'var(--ink3)'; }
function fillCatSeg(selC){ document.getElementById('ef-cat').innerHTML=CATS.map(function(c){ return '<b data-c="'+c+'" onclick="setItemCat(\''+c+'\')" class="'+(c===selC?'on':'')+'"><span class="dot" style="background:'+catColor(c)+'"></span>'+c+'</b>'; }).join(''); }
function setItemCat(c){ DB.items[sel].cat=c; save(); loadItem(sel); }
function fillDays(it){ var on=Array.isArray(it.days)?it.days:[]; var muted=!!it.daily;
  document.getElementById('ef-days').className='wkrow'+(muted?' muted':'');
  document.getElementById('ef-days').innerHTML=WD.map(function(w){ return '<span class="wd'+(on.indexOf(w.d)>=0?' on':'')+'" onclick="toggleDay('+w.d+')">'+w.n+'</span>'; }).join(''); }
function toggleDay(d){ var it=DB.items[sel]; if(!Array.isArray(it.days))it.days=[]; var k=it.days.indexOf(d); if(k>=0)it.days.splice(k,1); else it.days.push(d); save(); loadItem(sel); }
function setT(t){ T=t; ['I','S','A','B'].forEach(function(x){document.getElementById('t'+x).classList.toggle('on',x===t); document.getElementById('a'+x).classList.toggle('on',x===t);}); }
function daysLabel(it){ if(it.daily) return '每日'; if(!it.days||!it.days.length) return '未排'; var map={0:'日',1:'一',2:'二',3:'三',4:'四',5:'五',6:'六'}; return '週'+[1,2,3,4,5,6,0].filter(function(d){return it.days.indexOf(d)>=0;}).map(function(d){return map[d];}).join(''); }
function renderItems(){ var html='';
  DB.areas.forEach(function(a){ var idxs=[]; DB.items.forEach(function(it,i){ if(it.area===a.name) idxs.push(i); }); if(!idxs.length)return;
    html+='<div class="ah"><span class="aic" style="color:'+a.color+'">'+ICONS[a.icon||'dot']+'</span> '+a.name+'區</div>';
    idxs.forEach(function(i){ var it=DB.items[i];
      html+='<div class="it'+(i===sel?' sel':'')+'" onclick="loadItem('+i+')"><span class="blk" style="background:'+bvar(it.band)+'"></span><span class="nm">'+it.name+'</span><span class="catdot" style="background:'+catColor(it.cat)+'"></span><span class="meta">'+it.std+it.unit+' · '+it.min+'分 · '+daysLabel(it)+(it.enabled?'':' <span class="off">停用</span>')+'</span></div>';
    });
  });
  document.getElementById('itemlist').innerHTML=html;
}
function fillAreaSeg(selName){ document.getElementById('ef-area').innerHTML=DB.areas.map(function(a){ return '<b data-a="'+a.name+'" onclick="setItemArea(\''+a.name+'\')" class="'+(a.name===selName?'on':'')+'"><span class="aic" style="color:'+a.color+'">'+ICONS[a.icon||'dot']+'</span>'+a.name+'</b>'; }).join(''); }
function loadItem(i){ sel=i; var it=DB.items[i];
  document.getElementById('ef-name').textContent=it.name; document.getElementById('ef-unit').textContent=it.unit;
  document.getElementById('ef-std').textContent=it.std; document.getElementById('ef-min').innerHTML=it.min+'<span class="suffix">分</span>';
  fillAreaSeg(it.area);
  fillCatSeg(it.cat||'');
  fillDays(it);
  document.querySelectorAll('#ef-band b').forEach(function(b){b.classList.toggle('on',b.dataset.b===it.band);});
  document.getElementById('ef-daily').classList.toggle('on',!!it.daily);
  document.getElementById('ef-on').classList.toggle('on',it.enabled!==false);
  renderItems();
}
function setItemArea(n){ DB.items[sel].area=n; save(); loadItem(sel); }
function setItemBand(b){ DB.items[sel].band=b; save(); loadItem(sel); }
function editField(f){ var it=DB.items[sel]; var v=prompt('修改 '+f, it[f]); if(v===null)return; if(f==='std'||f==='min'){ v=parseFloat(v); if(isNaN(v))return; } it[f]=v; save(); loadItem(sel); }
function toggleField(f){ var it=DB.items[sel]; it[f]=!it[f]; save(); loadItem(sel); }
function addItem(){ var n=prompt('新品項名稱'); if(!n)return; DB.items.push({name:n,area:DB.areas[0].name,unit:'份',std:1,min:10,band:'none',daily:false,enabled:true,cat:'',days:[]}); sel=DB.items.length-1; save(); loadItem(sel); }
function delItem(){ if(!DB.items.length)return; var it=DB.items[sel]; if(!it)return;
  if(!confirm('刪除「'+it.name+'」？此動作無法復原。')) return;
  DB.items.splice(sel,1); if(sel>=DB.items.length) sel=Math.max(0,DB.items.length-1);
  save(); renderItems(); if(DB.items.length){ loadItem(sel); } else { document.getElementById('ef-name').textContent='（尚無品項）'; } }
function renderStaff(){ document.getElementById('stafflist').innerHTML=DB.staff.map(function(s,i){
  return '<div class="strow"><img src="'+AV[s.animal]+'"><div><div class="nm">'+s.name+'</div><div class="an">'+ANM[s.animal]+'</div></div><div class="sp"><button class="ord" onclick="moveStaff('+i+',-1)">▲</button><button class="ord" onclick="moveStaff('+i+',1)">▼</button><div class="tg'+(s.enabled?' on':'')+'" onclick="toggleStaff('+i+')"><i></i></div></div></div>';
}).join(''); }
function moveStaff(i,d){ var j=i+d; if(j<0||j>=DB.staff.length)return; var t=DB.staff[i]; DB.staff[i]=DB.staff[j]; DB.staff[j]=t; save(); renderStaff(); }
function toggleStaff(i){ DB.staff[i].enabled=!DB.staff[i].enabled; save(); renderStaff(); }
function addStaff(){ var n=prompt('員工姓名'); if(!n)return; var used=DB.staff.map(function(s){return s.animal;}); var free=ANIMKEYS.filter(function(a){return used.indexOf(a)<0;}); var an=free.length?free[0]:'rabbit'; DB.staff.push({name:n,animal:an,enabled:true}); save(); renderStaff(); }
function renderAreas(){ document.getElementById('arealist').innerHTML=DB.areas.map(function(a,i){ var cnt=DB.items.filter(function(it){return it.area===a.name;}).length;
  return '<div class="strow"><span class="aicChip" style="color:'+a.color+'">'+ICONS[a.icon||'dot']+'</span><div><div class="nm">'+a.name+'區</div><div class="an">'+cnt+' 個品項</div></div><div class="sp"><button class="ord" onclick="moveArea('+i+',-1)">▲</button><button class="ord" onclick="moveArea('+i+',1)">▼</button></div></div>'; }).join(''); }
function moveArea(i,d){ var j=i+d; if(j<0||j>=DB.areas.length)return; var t=DB.areas[i]; DB.areas[i]=DB.areas[j]; DB.areas[j]=t; save(); renderAreas(); renderCount(); }
function addArea(){ var n=prompt('工作區名稱'); if(!n)return; DB.areas.push({name:n,icon:'dot',color:'var(--ink2)'}); save(); renderAreas(); }
function renderBands(){ document.getElementById('bandlist').innerHTML=['pre','am','mid'].map(function(k){
  return '<div class="bandcfg"><span class="sw3" style="background:'+bvar(k)+'"></span><div><div class="bn" onclick="editBand(\''+k+'\')">'+BNAME[k]+'</div><div class="bt">'+DB.bands[k].time+'</div></div><span class="lock">色 鎖定</span></div>'; }).join(''); }
function editBand(k){ var v=prompt('時段名稱',BNAME[k]); if(!v)return; BNAME[k]=v; DB.bands[k].name=v; save(); renderBands(); renderBoard(); }

/* setup note */
function renderSetup(){ document.getElementById('setup').innerHTML = useFB ? '已連線 Firebase（jenka-shouban）。' : '目前用本機儲存（localStorage）。要多裝置同步：在程式最上方 FIREBASE_CONFIG 填入你的 Firebase 設定；要實際推 LINE：填 GAS_ENDPOINT。'; }

/* ====== nav ====== */
function go(p){ ['count','board','admin'].forEach(function(x){ document.getElementById('page-'+x).classList.toggle('on',x===p); var b=document.getElementById('n'+x.charAt(0).toUpperCase()+x.slice(1)); if(b)b.classList.toggle('on',x===p); });
  if(p==='count') renderCount(); if(p==='board') renderBoard(); if(p==='admin'){ renderItems(); renderStaff(); renderAreas(); renderBands(); loadItem(sel); renderSetup(); } }

function init(){
  document.getElementById('hSub').textContent = todayStr().slice(5).replace('-','/') + '（收班盤點 → 明日備料）';
  bindDrag(); setV('time'); setT('I'); go('count');
}
load(init);
</script>
