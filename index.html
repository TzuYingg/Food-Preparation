<style>
  :root{ --bg:#FBF7F0; --surface:#fff; --ink:#4F4A43; --ink2:#857F75; --ink3:#ADA79C; --line:#ECE5D9; --tint:#F0ECE3; --accent:#BF5B3D;
    --pre:#F0916F; --am:#F4C543; --mid:#6FB98A; --none:#BBB4A6; --lack:#D7263D; --ok:#6FB98A; --danger:#D7263D; --danger-bg:#FCEBEA; --danger-line:#F3C9C5;
    --grill:#E07A66; --bread:#2E9CB0; --drink:#B5894E;
    --leaf:#5F8268; --brick:#A2503C; --brick-bg:#F7EEEB; --brick-line:#E6D2CB; --warn2:#B6863C;
    --btn-ink:#2B2824; --warn-soft:#F6EEDD; --accent-soft:#F5E7DF; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; color:var(--ink); background:var(--bg); font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; padding-top:calc(58px + env(safe-area-inset-top)); padding-bottom:78px;}
  .app{max-width:680px; margin:0 auto;}
  .head{position:relative; padding:15px 18px 4px;}
  .title{font-size:22px; font-weight:700; letter-spacing:-.3px;}
  .sub{font-size:12px; color:var(--ink2); margin-top:3px; font-weight:600;}
  .page{display:none;} .page.on{display:block;}
  /* 固定頂列（對齊煮茶／點貨：置中稻草人 logo ＋雲端狀態）*/
  .apphdr{position:fixed; left:0; right:0; top:0; background:rgba(251,247,240,.94); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); z-index:40; padding-top:env(safe-area-inset-top);}
  .apphdr-inner{max-width:680px; margin:0 auto; padding:9px 22px; min-height:58px; display:flex; align-items:center; justify-content:space-between; position:relative;}
  .hdr-logo{height:46px; width:46px; object-fit:contain; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);}
  .hdr-side{flex:1; display:flex; align-items:center;} .hdr-side:last-child{justify-content:flex-end;}
  .cloud{font-size:10.5px; font-weight:600; color:var(--ink3); display:flex; align-items:center; gap:5px; white-space:nowrap;}
  .cloud .cd{width:7px; height:7px; border-radius:50%; background:var(--ink3); flex:none;}
  .cloud.online .cd{background:var(--ok);} .cloud.offline .cd{background:var(--am);}
  .hint{font-size:11px; color:var(--ink3); padding:7px 18px 2px; text-align:center;}
  .seg{display:flex; gap:5px; background:#EEE7DC; padding:4px; border-radius:13px; margin:10px 14px 0;}
  .segb{flex:1; text-align:center; padding:9px 2px; border-radius:9px; font-size:13px; font-weight:800; color:var(--ink2);}
  .segb.on{background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(79,74,67,.12);}
  .mono{font-family:"DM Sans",sans-serif; font-variant-numeric:tabular-nums; font-weight:500;}
  .aic{display:inline-flex; align-items:center;}

  /* nav（比照點貨系統：頂線指示 + 深墨選取，無填色膠囊） */
  .nav{position:fixed; left:0; right:0; bottom:0; max-width:680px; margin:0 auto; background:#FCFAF6; border-top:1px solid var(--line); display:flex; padding:4px 0 max(12px,env(safe-area-inset-bottom)); z-index:30;}
  .nav button{flex:1; background:none; border:none; border-top:2px solid transparent; padding:7px 4px 0; font-weight:600; color:var(--ink3); display:flex; flex-direction:column; align-items:center; gap:3px;}
  .nav button.on{color:var(--btn-ink); border-top-color:var(--btn-ink);}
  .nav .ic{width:50px; height:28px; display:flex; align-items:center; justify-content:center;}
  .nav button.on .lab{color:var(--btn-ink); font-weight:700;}
  .nav .ic svg{width:22px; height:22px;}
  .nav .lab{font-size:10px; color:var(--ink3);}

  /* 盤點 */
  .cols{display:grid; grid-template-columns:1fr 1fr; gap:11px; padding:8px 14px;}
  @media (max-width:600px){ .cols{grid-template-columns:1fr; gap:10px;} }
  .col{border-radius:16px; padding:9px;}
  .band-ah{display:flex; align-items:center; gap:8px; padding:4px 5px 10px; font-size:14px; font-weight:800;}
  .band-ah .ic{width:27px; height:27px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:var(--tint);}
  .band-ah .ct{font-size:10px; font-weight:700; color:var(--ink3); margin-left:auto;}
  .ccard{background:var(--surface); border:1.5px solid var(--line); border-radius:13px; padding:11px 12px; margin-bottom:8px; box-shadow:0 2px 8px rgba(79,74,67,.06);}
  .ccard.low{border-color:var(--danger-line); background:var(--danger-bg);}
  .crow{display:flex; align-items:center; gap:8px;}
  .cname{font-size:16px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; line-height:1.25;}
  .ctags{display:flex; gap:6px; margin-top:9px;}
  .t-day{font-size:9.5px; font-weight:800; color:var(--ink3); background:var(--tint); border-radius:5px; padding:2px 6px; white-space:nowrap;}
  .t-urg{font-size:9.5px; font-weight:800; color:var(--brick); background:var(--brick-bg); border-radius:5px; padding:2px 6px 2px 5px; white-space:nowrap; display:inline-flex; align-items:center; gap:3px;}
  .t-urg::before{content:""; width:5px; height:5px; border-radius:50%; background:var(--brick); flex:none;}
  .sw{width:40px; height:22px; border-radius:12px; background:var(--leaf); position:relative; flex:none; border:1px solid transparent; transition:background .15s,border-color .15s;}
  .sw.off{background:var(--brick);}
  .sw.off.neutral{background:transparent; border-color:#D8D1C3;}
  .sw .kn{position:absolute; top:2.5px; left:20.5px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left .15s; box-shadow:0 1px 2px rgba(0,0,0,.18);}
  .sw.off .kn{left:2.5px;}
  .sw.off.neutral .kn{background:#CFC8BA; box-shadow:none;}
  .cmeta{display:flex; align-items:center; gap:8px; margin-top:11px; font-size:12px; color:var(--ink2);}
  .mlab{font-size:11px; color:var(--ink3); font-weight:700;}
  .mnum{font-family:"DM Sans",sans-serif; font-variant-numeric:tabular-nums; color:var(--ink); font-weight:500;}
  .mnum .u{font-family:-apple-system,"PingFang TC",sans-serif; color:var(--ink2); font-size:11px; margin-left:1px;}
  .msep{width:1px; height:13px; background:var(--line);}
  .step{display:inline-flex; align-items:center; border:1.5px solid var(--line); border-radius:9px; background:#fff; overflow:hidden;}
  .step button{border:none; background:none; width:29px; height:30px; font-size:17px; color:var(--ink2); font-weight:800;}
  .step .vl{min-width:24px; text-align:center; font-family:"DM Sans",sans-serif; font-variant-numeric:tabular-nums; font-size:15px; font-weight:500;}
  .step .u{font-size:10px; color:var(--ink3); padding:0 7px 0 2px; font-weight:700;}
  .bigbtn{display:block; width:calc(100% - 28px); margin:10px 14px 4px; background:var(--btn-ink); color:#fff; border:none; border-radius:13px; padding:15px; font-size:15px; font-weight:700; letter-spacing:.5px;}

  /* 出勤 */
  .attend{display:flex; gap:8px; margin:10px 14px 0; align-items:stretch;}
  .attbar{flex:7.5; display:flex; align-items:center; gap:6px; background:#fff; border:1.5px solid var(--line); border-radius:13px; padding:8px 12px;}
  .attbar img{width:24px; height:24px; object-fit:contain;}
  .attbar .al{font-size:12px; font-weight:800; color:var(--ink2); margin-right:2px;}
  .attbar .aedit{margin-left:auto; background:var(--tint); border:none; border-radius:9px; padding:7px 13px; font-size:12px; font-weight:800; color:var(--ink2);}
  .addbtn-sm{flex:2.5; display:flex; align-items:center; justify-content:center; border:1.5px dashed var(--accent); color:var(--accent); background:var(--surface); border-radius:13px; font-size:12px; font-weight:700; text-align:center; line-height:1.2;}

  /* 圖例 */
  .key{display:flex; gap:7px; margin:10px 14px 2px;}
  .kc{flex:1; display:flex; align-items:center; gap:6px; background:#fff; border-radius:12px; padding:8px; box-shadow:0 1px 4px rgba(79,74,67,.06);}
  .kc .sw2{width:6px; height:18px; border-radius:3px; flex:none;}
  .kc .ku{font-size:11px; font-weight:800;} .kc .kn{font-size:9px; color:var(--ink3); font-weight:700;}
  .kc.lk .sw2{width:auto; height:auto; border-radius:5px; background:var(--lack); color:#fff; font-size:9px; font-weight:800; padding:2px 4px; display:inline-flex; flex-direction:column; align-items:center; line-height:1;}

  /* 卡片/chip 共用 */
  .lack{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#fff; background:var(--lack); border-radius:5px; padding:2px 4px; line-height:1; flex:none;}
  .chip{display:inline-flex; align-items:center; gap:7px; background:#FBF8F2; border:1.5px solid var(--line); border-radius:11px; padding:7px 11px; font-weight:800; font-size:15px; touch-action:none; user-select:none; -webkit-touch-callout:none;}
  .chip.done{opacity:.45; text-decoration:line-through; background:#F3EFE7;}
  .chip .blk{width:5px; height:18px; border-radius:3px; flex:none;}
  .chip .av{width:24px; height:24px; object-fit:contain;}
  .cm{font-size:10px; color:var(--ink3); font-weight:700;}
  .stag{font-size:9px; font-weight:800; border-radius:5px; padding:1px 5px; line-height:1.4; flex:none;}
  .stag.plan{color:#356074; background:#E3EFF3;}
  .stag.short{color:#fff; background:var(--danger);}
  .todaybar{display:flex; align-items:center; gap:10px; margin:10px 14px 2px; padding:11px 14px; background:#FCF6EE; border:1.5px solid #EADFCB; border-radius:13px; font-weight:800; font-size:14px;}
  .todaybar .tb-n{color:var(--ink3); font-size:12px; font-weight:700;}
  .todaybar .tb-seg{margin-left:0; font-size:12px; font-weight:700; color:var(--ink2); display:inline-flex; align-items:center; gap:5px;}
  .todaybar .tb-seg:first-of-type{margin-left:auto;}
  .todaybar .tb-seg i{width:8px; height:8px; border-radius:50%;}
  .todaybar .tb-seg i.plan{background:#4E7C8E;} .todaybar .tb-seg i.short{background:var(--danger);}
  .av-un{width:24px; height:24px; border-radius:50%; background:#EDE6D9; color:var(--ink3); display:inline-flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex:none;}

  /* 依時段 */
  .bandc{margin:9px 14px; background:#fff; border:1px solid var(--line); border-radius:16px; box-shadow:0 1px 2px rgba(79,74,67,.04); overflow:hidden;}
  .bandc-h{display:flex; align-items:center; gap:9px; padding:12px 13px 10px; font-weight:800; font-size:15px;}
  .bandc-h .bar{width:5px; height:19px; border-radius:3px;}
  .bandc-h .t{font-weight:600; color:var(--ink3); font-size:12px;}
  .bandc-h .meta{margin-left:auto; font-size:11px; color:var(--ink3); font-weight:700;}
  .bandc-body{padding:2px 12px 12px; display:flex; flex-wrap:wrap; gap:8px; min-height:44px;}

  /* 依人 */
  .prow{display:flex; gap:11px; background:#fff; border-radius:16px; padding:11px; margin:9px 14px; box-shadow:0 2px 8px rgba(79,74,67,.07);}
  .who{width:56px; flex:none; display:flex; flex-direction:column; align-items:center; gap:2px; border-right:1px solid #F1ECE3; padding-right:9px;}
  .who img{width:44px; height:44px; object-fit:contain;} .who .av-un{width:44px; height:44px; font-size:18px;} .who .pn{font-size:13px; font-weight:800;}
  .tasks{flex:1; display:flex; flex-wrap:wrap; gap:8px; align-content:flex-start; min-height:44px;}
  .pmeta-r{width:100%; display:flex; justify-content:flex-end; align-items:center; gap:10px; flex-wrap:wrap; margin-top:4px;}
  .pcount{font-size:11px; color:var(--ink3); font-weight:800;}
  .bm{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:800; color:var(--ink2); font-variant-numeric:tabular-nums;}
  .bm i{width:9px; height:9px; border-radius:2px;}

  .footwrap{margin:12px 14px 2px; display:flex; flex-direction:column; gap:9px;}
  .addbtn{width:100%; background:var(--surface); border:1.5px dashed var(--accent); color:var(--accent); border-radius:13px; padding:13px; font-size:15px; font-weight:700;}
  .linebtn{width:100%; background:#06C755; color:#fff; border:none; border-radius:13px; padding:15px; font-size:16px; font-weight:800;}
  .linebtn .s{display:block; font-size:11px; font-weight:700; opacity:.9; margin-top:2px;}

  .ghost{opacity:.28;} .dragging{position:fixed; z-index:999; pointer-events:none; box-shadow:0 12px 26px rgba(79,74,67,.3); transform:scale(1.05);}
  .over{outline:2px dashed var(--pre); outline-offset:3px; border-radius:14px;}

  /* sheet */
  #sheet{position:fixed; inset:0; display:none; z-index:50;} #sheet.on{display:block;}
  .sheet-bd{position:absolute; inset:0; background:rgba(43,40,36,.32);}
  .sheet-card{position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:100%; max-width:680px; background:var(--bg); border-radius:20px 20px 0 0; padding:16px 16px calc(18px + env(safe-area-inset-bottom)); box-shadow:0 -8px 30px rgba(0,0,0,.18);}
  .sheet-title{font-size:17px; font-weight:800; text-align:center;}
  .sheet-label{font-size:11px; color:var(--ink3); font-weight:800; margin:13px 2px 8px;}
  .bandpick{display:flex; gap:8px;}
  .bandpick b{flex:1; text-align:center; padding:13px 4px; border-radius:12px; font-size:14px; font-weight:800; background:#fff; border:1.5px solid var(--line); color:var(--ink2); display:inline-flex; align-items:center; justify-content:center; gap:6px;}
  .bandpick b.on{border-color:var(--ink); color:var(--ink); box-shadow:0 0 0 2px rgba(79,74,67,.08);}
  .bandpick .dot{width:10px; height:10px; border-radius:3px;}
  .sheet-row{display:flex; align-items:center; justify-content:space-between; margin-top:14px; background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; font-weight:800; font-size:14px;}
  .tg{width:46px; height:26px; border-radius:14px; background:#DDD5C8; position:relative; flex:none;}
  .tg.on{background:var(--mid);} .tg i{position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:2px; left:2px; transition:left .15s;} .tg.on i{left:22px;} .tg.danger.on{background:var(--lack);}
  .sheet-actions{display:flex; gap:10px; margin-top:14px;}
  .sheet-actions button{flex:1; border:none; border-radius:13px; padding:14px; font-size:15px; font-weight:800;}
  .b-done{background:var(--ink); color:#fff;} .b-close{background:#EEE7DC; color:var(--ink2);}
  .b-del{display:block; width:100%; margin-top:10px; border:none; background:transparent; color:var(--danger); font-weight:800; font-size:13.5px; padding:11px; border-radius:11px; cursor:pointer;}
  .b-del:active{background:var(--danger-bg);}
  .daytoggle{display:flex; gap:4px; background:#e9e3d8; border-radius:13px; padding:4px; margin:0 0 12px;}
  .daytoggle b{flex:1; text-align:center; border-radius:10px; padding:8px 6px; font-size:14px; font-weight:700; color:var(--ink2); cursor:pointer; line-height:1.2; display:flex; flex-direction:column; gap:1px;}
  .daytoggle b span{font-size:10.5px; font-weight:500; color:var(--ink3);}
  .daytoggle b.on{background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.07);}
  .daytoggle b.on span{color:var(--ink2);}
  .yestnote{font-size:12px; color:var(--ink2); background:#fbf6ea; border:1px solid #ecddb8; border-radius:11px; padding:9px 12px; margin-bottom:12px; line-height:1.5;}
  .yestcols{display:block;}
  .yestcols .bandc{margin-bottom:12px;}
  .yestcols .bandc-body{display:block; padding:2px 14px 6px;}
  .yestcols .bandc-h{display:flex; align-items:center; gap:9px; padding:12px 14px 10px;}
  .yestcols .bandc-h .snm{font-weight:800; font-size:15px;}
  .yrow{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid #f1ece2;}
  .yrow:last-child{border-bottom:none;}
  .yrow .ynm{font-weight:700; font-size:14.5px; flex:0 0 auto; white-space:nowrap; color:var(--ink);}
  .yrow .yval{flex:1 1 auto; text-align:right; font-size:13px; color:var(--ink3); white-space:nowrap; font-variant-numeric:tabular-nums;}
  .ytag{flex:0 0 auto; min-width:44px; text-align:center; font-size:11px; font-weight:800; border-radius:999px; padding:3px 10px; white-space:nowrap;}
  .ytag.ok{color:#3f7d52; background:#e8f1ea;} .ytag.low{color:var(--danger); background:var(--danger-bg);} .ytag.un{color:#9a948a; background:#efeae0;}
  .ar{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid #F1ECE3;}
  .ar img{width:34px; height:34px; object-fit:contain;} .ar .arn{font-weight:800; font-size:15px;} .ar .tg{margin-left:auto;}
  .arlist{max-height:48vh; overflow:auto; margin-top:8px;}

  /* 後台 */
  .card{background:var(--surface); border-radius:16px; box-shadow:0 2px 8px rgba(79,74,67,.07); margin:10px 14px; padding:14px;}
  .card-h{font-size:12px; font-weight:800; color:var(--accent); margin-bottom:12px;}
  .field{margin-bottom:13px;} .flabel{font-size:11px; color:var(--ink3); font-weight:800; margin-bottom:5px;}
  .finput{background:#FBF8F2; border:1.5px solid var(--line); border-radius:10px; padding:11px 12px; font-size:15px; font-weight:700; display:flex; align-items:center;}
  .finput .suffix{margin-left:auto; color:var(--ink3); font-size:12px;}
  .segc{display:flex; flex-wrap:wrap; background:#EEE7DC; border-radius:9px; padding:3px; gap:2px;}
  .segc b{padding:8px 13px; border-radius:7px; font-size:13px; font-weight:800; color:var(--ink2); display:inline-flex; align-items:center; gap:6px;}
  .segc b.on{background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(79,74,67,.12);}
  .segc .dot{width:9px; height:9px; border-radius:3px;}
  .wkrow{display:flex; gap:6px;}
  .wkrow .wd{flex:1; text-align:center; padding:9px 0; border-radius:9px; border:1.5px solid var(--line); background:#fff; font-size:13px; font-weight:800; color:var(--ink3);}
  .wkrow .wd.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .wkrow.muted{opacity:.4; pointer-events:none;}
  .it .catdot{width:7px; height:7px; border-radius:2px; flex:none; margin-left:6px;}
  .row2{display:flex; gap:12px;} .row2 .field{flex:1;}
  .tgwrap{display:flex; align-items:center; justify-content:space-between;}
  .save{display:block; width:100%; margin-top:4px; background:var(--ink); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:800;}
  .ah{font-size:13px; font-weight:800; color:var(--ink2); margin:14px 18px 8px; display:flex; align-items:center; gap:7px;}
  .it{display:flex; align-items:center; gap:10px; background:#fff; border:1.5px solid #F1ECE3; border-radius:12px; padding:11px 12px; margin:0 14px 8px;}
  .it.sel{border-color:var(--accent); box-shadow:0 0 0 2px rgba(191,91,61,.12);}
  .it .blk{width:5px; height:20px; border-radius:3px; flex:none;} .it .nm{font-weight:800; font-size:15px;}
  .it .meta{margin-left:auto; font-size:11px; color:var(--ink3); font-weight:700;}
  .it .off{color:var(--ink3); font-weight:800; font-size:11px; background:#F0ECE3; padding:2px 7px; border-radius:6px; margin-left:6px;}
  .strow{display:flex; align-items:center; gap:11px; background:#fff; border:1.5px solid #F1ECE3; border-radius:13px; padding:10px 12px; margin:0 14px 8px;}
  .strow img{width:40px; height:40px; object-fit:contain;} .strow .nm{font-weight:800; font-size:15px;} .strow .an{font-size:11px; color:var(--ink3); font-weight:700;}
  .strow .aicChip{width:36px; height:36px; border-radius:10px; background:var(--tint); display:inline-flex; align-items:center; justify-content:center;}
  .strow .sp{margin-left:auto; display:flex; align-items:center; gap:6px;}
  .ord{background:var(--tint); border:none; border-radius:7px; width:28px; height:28px; font-size:14px; font-weight:800; color:var(--ink2);}
  .bandcfg{display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid #F1ECE3; border-radius:13px; padding:12px; margin:0 14px 8px;}
  .bandcfg .sw3{width:8px; height:30px; border-radius:4px;} .bandcfg .bn{font-size:15px; font-weight:800;} .bandcfg .bt{font-size:12px; color:var(--ink3); font-weight:700; margin-top:2px;}
  .bandcfg .lock{margin-left:auto; font-size:10px; color:var(--ink3); font-weight:800; background:#F0ECE3; padding:3px 8px; border-radius:7px;}
  .setup{margin:10px 14px; padding:11px 13px; background:#FFF6E9; border:1px solid #F0D9AE; border-radius:12px; font-size:11px; color:#8a6d3b; line-height:1.6;}

  /* ===== 盤點頂部：今日 + 明日備料提醒 ===== */
  .ctop{padding:8px 14px 2px;}
  .remind{display:flex; align-items:center; gap:11px; border-radius:14px; padding:11px 13px; border:1.5px solid var(--line); background:var(--surface);}
  .remind.hol{border-color:rgba(191,91,61,.35); background:#FBF1EC;}
  .remind .rico{width:34px; height:34px; border-radius:10px; flex:none; display:flex; align-items:center; justify-content:center; background:var(--tint); color:var(--ink2);}
  .remind.hol .rico{background:rgba(191,91,61,.13); color:var(--accent);}
  .remind .rico svg{width:19px; height:19px;}
  .remind .rb{min-width:0; flex:1;}
  .remind .rl{font-size:11px; font-weight:800; color:var(--ink3); letter-spacing:.5px;}
  .remind .rm{font-size:16px; font-weight:800; color:var(--ink); margin-top:2px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .remind .rm .m{font-family:"DM Sans",sans-serif; font-variant-numeric:tabular-nums; font-weight:500;}
  .remind .rh{font-size:11.5px; font-weight:700; margin-top:3px;}
  .remind.hol .rh{color:var(--accent);} .remind .rh{color:var(--ink3);}
  .daychip{font-size:11.5px; font-weight:700; border-radius:8px; padding:3px 10px; letter-spacing:.3px;}
  .dc-wk{background:var(--tint); color:var(--ink2);}
  .dc-ph{background:var(--warn-soft); color:var(--warn2);}
  .dc-hol{background:var(--accent-soft); color:var(--accent); border:1px solid rgba(191,91,61,.3);}
  .dtedit{margin-left:auto; font-size:11px; font-weight:700; color:var(--ink2); background:var(--tint); border:none; border-radius:8px; padding:6px 11px; flex:none;}
  .dtpick{display:flex; gap:6px; margin-top:9px; flex-wrap:wrap;}
  .dtpick b{font-size:12px; font-weight:800; padding:7px 11px; border-radius:9px; background:#fff; border:1.5px solid var(--line); color:var(--ink2);}
  .dtpick b.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .dtmark{font-size:10px; font-weight:800; color:var(--accent); margin-left:2px;}

  /* ===== A 編輯模式：卡片可編輯 ===== */
  .ccard.ed{border-style:dashed; border-color:var(--ink3); box-shadow:none;}
  .edhead{display:flex; align-items:center; gap:8px;}
  .edhead .drag{display:flex; flex-direction:column; gap:2px; flex:none;}
  .edhead .drag button{border:none; background:var(--tint); color:var(--ink2); width:26px; height:20px; border-radius:6px; font-size:11px; font-weight:800; line-height:1; padding:0;}

function clone(o){ return JSON.parse(JSON.stringify(o)); }
/* 把「最近一個有任務的前一天」沒做完的任務，帶進指定的某一天（只帶一次、已完成的不帶）。
   解決「早上重開 app 才換日」時，前一天排的任務沒被帶過來的問題。 */
function carryTasksInto(t){
  if(!DB.days[t]) return;
  if(DB.days[t]._carried2){ return; }              // 用新標記，讓既有資料強制重跑一次修正
  var cur=Array.isArray(DB.days[t].tasks)?DB.days[t].tasks:[];
  var hasToday=cur.some(function(x){ return (x['for']||'today')==='today'; });
  if(!hasToday){                                   // 只要還沒有「今日」類任務，就把前一天沒做完的帶進來（已排的明日任務保留）
    var keys=Object.keys(DB.days).filter(function(k){ return k<t; }).sort();
    var pk=keys[keys.length-1];
    if(pk && DB.days[pk] && Array.isArray(DB.days[pk].tasks)){
      var carried=DB.days[pk].tasks.filter(function(x){return !x.done;}).map(function(x){ var c={}; for(var k in x){ c[k]=x[k]; } c['for']='today'; return c; });
      DB.days[t].tasks=cur.concat(carried);
    }
  }
  DB.days[t]._carried2=true;
}
function applyData(v){
  if(!v||!v.items){ DB=clone(DEFAULT); DB.days={}; }
  else { DB=v; ['areas','bands','staff','items','cats'].forEach(function(k){ if(!DB[k]||!DB[k].length) DB[k]=clone(DEFAULT[k]); }); if(!DB.days)DB.days={}; }
  // 舊資料相容：補上種類(cat)與排定週幾(days)
  (DB.items||[]).forEach(function(it){ var d=DEFAULT.items.filter(function(x){return x.name===it.name;})[0];
    if(it.cat===undefined||it.cat===null) it.cat = d?d.cat:'';
    if(!Array.isArray(it.days)) it.days = d?clone(d.days):[];
    if(it.tuibing===undefined) it.tuibing=false;
    if(!Array.isArray(it.ops)) it.ops=[];
    if(!it.opMin||typeof it.opMin!=='object') it.opMin={};
    if(it.enabled===false){ it.area=''; it.enabled=true; } });
  if(!DB.cats||!DB.cats.length) DB.cats=clone(DEFAULT.cats);
  if(!Array.isArray(DB.ops)||!DB.ops.length) DB.ops=clone(DEFAULT.ops);

/* 自動更新：抓最新程式比對版本號，有新版且使用者沒在操作時，自動以乾淨網址重新載入（繞過快取） */
function checkForUpdate(){
  if(location.protocol==='file:') return;
  try{
    fetch('index.html?vc='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok?r.text():null;}).then(function(t){
      if(!t) return;
      var m=t.match(/APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
      if(!m) return;
      var remote=m[1];
      if(remote===APP_VERSION){ try{sessionStorage.removeItem('jenka_updv');}catch(e){} return; }
      if(uiBusy()) return;                                   // 操作中先不打斷，下次檢查再說
      var tried; try{tried=sessionStorage.getItem('jenka_updv');}catch(e){}
      if(tried===remote) return;                             // 已試過此版本仍沒更新到 → 不重複重載，避免迴圈
      try{sessionStorage.setItem('jenka_updv',remote);}catch(e){}
      location.replace(location.pathname+'?u='+encodeURIComponent(remote));   // 以版本號當網址參數，強制抓新版
    }).catch(function(){});
  }catch(e){}
}
function load(cb){
  if(useFB){ try{ firebase.initializeApp(FIREBASE_CONFIG); fbRef=firebase.database().ref('jenka-shouban');
      try{ firebase.database().ref('.info/connected').on('value', function(cs){ var el=document.getElementById('hdrCloud'); if(!el) return; var on=!!(cs&&cs.val()); el.innerHTML='<span class="cloud '+(on?'online':'offline')+'"><span class="cd"></span>'+(on?'雲端已連線':'離線')+'</span>'; }); }catch(e){}
      /* 持續監聽：任何裝置改了資料，這台都會即時收到並更新（不再只讀一次） */
      fbRef.on('value', function(s){
        var v=s.val();
        if(!gotFirst){ gotFirst=true; applyData(v); cb(); return; }   // 首次：初始化畫面
        if(!v) return;
        applyData(v);                                                 // 永遠先把本機資料更新成最新
        if(v._w && v._w.id===CLIENT_ID) return;                       // 這是自己寫入的回音 → 不重繪，避免畫面亂跳
        if(uiBusy()) return;                                          // 別台改了，但你正在操作 → 資料已更新，待下一動作自然帶入
        softRerender();                                              // 別台改了且你沒在操作 → 立即同步畫面
      }, function(){                                                  // 讀取失敗 → 退回本機儲存，仍能開啟
        if(!gotFirst){ gotFirst=true; applyData(JSON.parse(lsGet('jenka-shouban')||'null')); cb(); }
      });
      return;
    }catch(e){} }
  applyData(JSON.parse(lsGet('jenka-shouban')||'null')); cb();
}

      } else if(state==='low'){
        line='<button class="now lo" onclick="openCount(\''+it.name+'\')">'+cur+'</button>'+stdEl+tierTag+cap;
      } else {
        line='<span class="now">'+cur+'</span>'+stdEl+tierTag+cap;

    if(tb.length){
      html+='<div class="tbsec"><div class="tbsec-h">'+TBICON+'<span class="tbsec-t">退冰</span><span class="tbsec-c">'+tb.length+'項 · 退好打勾</span></div>';
      tb.forEach(function(it){
        var done=!!(day().tuibing&&day().tuibing[it.name]);

  cols.innerHTML=html;
  var unc2=DB.items.filter(function(it){return assigned(it)&&!it.tuibing&&day().counts[it.name]==null;}).length;
  var cs=document.getElementById('countStatus');
  if(cs){ var sv=day().countSaved;
    cs.innerHTML=(unc2?('<span class="cs-un">尚有 '+unc2+' 項未點，點完才能產生任務</span>'):('<span class="cs-ok">已全部點完 ✓ 可產生任務</span>'))
      +(sv?('<span class="cs-sv">進度存於 '+sv+'</span>'):''); }
  var gb=document.getElementById('genBtn'); if(gb) gb.classList.toggle('disabled', unc2>0);

function genTasks(){
  var D=day(), added=0;
  var unc=DB.items.filter(function(it){return assigned(it)&&!it.tuibing&&D.counts[it.name]==null;});
  if(unc.length){ alert('還有 '+unc.length+' 項未點，無法產生任務。\n請先把每一項都點過（料夠按開關轉綠，或點數字填入實際量）。'); return; }
  DB.items.forEach(function(it){
    if(!assigned(it)||it.tuibing) return;
    var counted=D.counts[it.name]!=null, cur=curOf(it.name), low=counted&&cur<effStd(it);
    if(!(low||dueTomorrow(it))) return;
    var ops=(it.ops&&it.ops.length)?it.ops:[''];
    ops.forEach(function(op){
      if(hasTask(D,it.name,op)) return;
      D.tasks.push({id:'t'+Date.now()+'_'+(added),name:it.name,owner:'未指派',band:low?'pre':(it.band||'none'),min:(op?taskMin(it,op):it.min),stock:low?'out':'ok',done:false,cat:it.cat||'','for':'tmr',op:op});
      added++;
    });
  });
  boardFor='tmr';
  save(); 
  alert('已產生 '+added+' 項任務（為明日備料）。已切到「明日工作」分頁，可指派負責人。');
  go('board');
}

function rowFromTasks(label,ts,isUn){

function addTask(){
  var onBoard=day().tasks.map(function(t){return t.name;});
  function pickable(it){ return (it.ops&&it.ops.length) ? true : onBoard.indexOf(it.name)<0; }
  var cats=[]; DB.items.forEach(function(it){ if(pickable(it)){ var c=it.cat||'未分類'; if(cats.indexOf(c)<0)cats.push(c); } });
  var body='<div class="pick-custom" onclick="addCustomTask()">＋ 自訂任務（僅這次，不存進品項庫）</div>';
  cats.forEach(function(c){
    var its=DB.items.filter(function(it){ return (it.cat||'未分類')===c && pickable(it); });
    body+='<div class="pick-cat"><span class="dot" style="background:'+catColor(c==='未分類'?'':c)+'"></span>'+c+'</div>';
    body+='<div class="pickgrid">'+its.map(function(it){ var ho=(it.ops&&it.ops.length); return '<div class="pi" onclick="addItemTask(\''+it.name.replace(/'/g,"\\'")+'\')">'+it.name+'<span class="pl">'+(ho?'&#8250;':'＋')+'</span></div>'; }).join('')+'</div>';
  });
  if(!cats.length) body+='<div class="hint" style="padding:16px">所有品項都已在板上了</div>';
  document.getElementById('sheet').classList.add('on');
  document.getElementById('sheet').innerHTML='<div class="sheet-bd" onclick="closeSheet()"></div><div class="sheet-card"><div class="sheet-title">新增任務</div><div class="sheet-label">點品項加入板（先進待排）；有作業的品項可挑步驟</div><div class="picklist">'+body+'</div><div class="sheet-actions"><button class="b-done" onclick="closeSheet()">完成</button></div></div>';
}

  day().tasks.push({id:'t'+Date.now(),name:name,owner:'未指派',band:'none',min:it.min||10,stock:'ok',done:false,cat:it.cat||'','for':boardFor,op:''}); save(); renderBoard(); addTask(); }
function pickOpTask(name){ var it=itemBy(name); if(!it)return; var D=day();

function shareOrDownload(file,done){

var drag=null,start=null,lpTimer=null,lpFired=false;
function bindDrag(){ var stage=document.getElementById('stage');
  stage.addEventListener('pointerdown',function(e){ var el=e.target.closest('.chip'); if(!el)return;
    start={id:el.dataset.id,x:e.clientX,y:e.clientY,el:el,moved:false}; lpFired=false;
    lpTimer=setTimeout(function(){ lpFired=true; openSheet(start.id); },420);
    document.addEventListener('pointermove',onMove); document.addEventListener('pointerup',onUp); document.addEventListener('pointercancel',onUp); });
}
function begin(e){ var el=start.el,r=el.getBoundingClientRect(),c=el.cloneNode(true); c.classList.add('dragging'); c.style.width=r.width+'px'; c.style.left=r.left+'px'; c.style.top=r.top+'px'; document.body.appendChild(c); el.classList.add('ghost'); drag={id:start.id,clone:c,dx:e.clientX-r.left,dy:e.clientY-r.top}; }
function onMove(e){ if(!start||lpFired)return; if(!drag){ if(Math.abs(e.clientX-start.x)+Math.abs(e.clientY-start.y)>6){start.moved=true; clearTimeout(lpTimer); begin(e);} else return; }
  drag.clone.style.left=(e.clientX-drag.dx)+'px'; drag.clone.style.top=(e.clientY-drag.dy)+'px';
  var o=zoneUnder(e.clientX,e.clientY),z=document.querySelectorAll('[data-zone]'); for(var i=0;i<z.length;i++) z[i].classList.toggle('over',z[i].dataset.zone===o); }
function zoneUnder(x,y){ drag.clone.style.display='none'; var el=document.elementFromPoint(x,y); drag.clone.style.display=''; var z=el&&el.closest('[data-zone]'); return z?z.dataset.zone:null; }
function onUp(e){ document.removeEventListener('pointermove',onMove); document.removeEventListener('pointerup',onUp); document.removeEventListener('pointercancel',onUp); clearTimeout(lpTimer);
  if(lpFired){ start=null; return; }
  if(drag){ var o=zoneUnder(e.clientX,e.clientY); if(o){ var it=byId(drag.id),p=o.split(':'); if(it){ if(p[0]==='band') it.band=p[1]; else if(p[0]==='owner') it.owner=p[1]; } }
    document.querySelectorAll('.over').forEach(function(z){z.classList.remove('over');}); drag.clone.remove(); drag=null; start=null; save(); renderBoard(); return; }
  if(start&&!start.moved){ var t=byId(start.id); if(t){ t.done=!t.done; save(); renderBoard(); } } start=null;
}

/* setup note */
function renderSetup(){ var base = useFB ? '已連線 Firebase（jenka-shouban）。' : '目前用本機儲存（localStorage）。要多裝置同步：在程式最上方 FIREBASE_CONFIG 填入你的 Firebase 設定；要實際推 LINE：填 GAS_ENDPOINT。';
  document.getElementById('setup').innerHTML = base + '<div style="margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px"><span style="font-size:13px;font-weight:700;color:var(--ink)">後台密碼</span><button onclick="changeAdminPass()" style="font-size:12.5px;font-weight:700;color:var(--ink2);background:var(--tint);border:none;border-radius:8px;padding:7px 14px">更改</button></div><div style="margin-top:10px;font-size:11px;color:var(--ink3);font-family:\'DM Mono\',monospace">版本 作業軸-3（作業選單可後台管理：新增／改名／刪除／排序）</div>'; }

/* ====== 後台密碼門 ====== */
var adminUnlocked=false;
function openAdminGate(){ var g=document.getElementById('adminGate'); g.classList.add('on'); var e=document.getElementById('agErr'); if(e)e.style.display='none'; var i=document.getElementById('agInput'); if(i){ i.value=''; setTimeout(function(){ try{i.focus();}catch(_){} },60); } }
function closeAdminGate(){ document.getElementById('adminGate').classList.remove('on'); }
function tryAdminUnlock(){ var v=(document.getElementById('agInput').value||''); if(v===(DB.adminPass||'jenka@kaka')){ adminUnlocked=true; closeAdminGate(); go('admin'); } else { var e=document.getElementById('agErr'); if(e)e.style.display='block'; } }
function changeAdminPass(){ var v=prompt('輸入新的後台密碼', DB.adminPass||''); if(v===null)return; v=(''+v).trim(); if(!v){ alert('密碼不可空白'); return; } DB.adminPass=v; save(); alert('已更新後台密碼'); }

/* ====== 後台 · 品項表（單表 / 分區 / 拖曳 / 轉站別） ====== */
var iaEdit={i:-1,t:''}, unasOpen=false, detSel=-1, iaDrag=null;
function openSheetHtml(inner){ var s=document.getElementById('sheet'); s.innerHTML='<div class="sheet-bd" onclick="closeSheet()"></div><div class="sheet-card">'+inner+'</div>'; s.classList.add('on'); }
function renderItemsAdmin(){ var el=document.getElementById('itemsAdmin'); if(!el)return;
  var tt=tomorrowTier();
  var h='<div class="iaIntro">需盤點品項依站別分區。數字點一下調整；平假日／假日留「同」＝沿用平日。拖 ≡ 排序（連動盤點頁），拖到另一區或點品名可轉站別。</div>';
  h+='<div class="iaTbl"><div class="iaHead"><span class="nmh">品名</span><span>單位</span><span>平日</span><span>平假日</span><span>假日</span></div>';
  DB.areas.forEach(function(a){
    var idxs=[]; DB.items.forEach(function(it,i){ if(it.area===a.name) idxs.push(i); });
    h+='<div class="iaZone"><span class="zd" style="background:'+a.color+'"></span><b>'+a.name+'</b><span class="zc">'+idxs.length+' 項 · 可拖曳</span></div>';
    idxs.forEach(function(i){ h+=iaRowHtml(i); });
  });
  h+='</div>';
  var un=[]; DB.items.forEach(function(it,i){ if(!assigned(it)) un.push(i); });
  h+='<div class="iaDD"><div class="iaDDbar'+(unasOpen?' open':'')+'" onclick="toggleUnas()"><span class="chev">&#9654;</span><span class="dot"></span><b>未分配（不盤點）</b><span class="c">'+un.length+' 項 · 免填需求量</span></div>';
  if(unasOpen){
    if(!un.length){ h+='<div class="iaNote">目前沒有未分配品項</div>'; }
    un.forEach(function(i){ var it=DB.items[i];
      h+='<div class="iaUn"><span class="un" onclick="openItemDetail('+i+')">'+it.name+'</span><span class="uc">'+(it.cat||'未分類')+'</span><span class="assign" onclick="iaPickStation('+i+')">指派站別</span></div>'; });
  }
  h+='</div>';
  h+='<div class="iaAdd" onclick="addItemAdmin()">＋ 新增品項</div>';
  h+='<div class="iaNote">點品名可展開改名／單位／種類／站別／時段／刪除</div>';
  el.innerHTML=h;
}
function iaRowHtml(i){ var it=DB.items[i];
  var hand='<div class="iaHand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 7h8M8 12h8M8 17h8"/></svg></div>';
  var nm='<div class="iaNm" onclick="openItemDetail('+i+')">'+it.name+(it.tuibing?'<span class="tbTag">'+TBICON+'退冰</span>':'')+'<span class="chev">&#8250;</span></div>';
  var unit='<div class="iaCell iaUnit">'+it.unit+'</div>';
  return '<div class="iaRow'+(it.tuibing?' tb':'')+'" data-idx="'+i+'" data-area="'+it.area+'">'+hand+nm+unit+iaCellHtml(i,'wk')+iaCellHtml(i,'ph')+iaCellHtml(i,'hol')+'</div>';
}
function iaCellHtml(i,t){ var it=DB.items[i];
  if(iaEdit.i===i && iaEdit.t===t){
    var rst=(t!=='wk')?'<button class="rst" onclick="event.stopPropagation();iaReset('+i+',\''+t+'\')">同</button>':'';
    return '<div class="iaCell"><span class="iaStep" onclick="event.stopPropagation()"><button onclick="iaBump('+i+',\''+t+'\',-0.5)">&minus;</button><span class="v">'+resolveStd(it,t)+'</span><button onclick="iaBump('+i+',\''+t+'\',0.5)">&plus;</button>'+rst+'</span></div>';
  }
  var inh=(t==='ph'&&it.stdPH==null)||(t==='hol'&&it.stdHol==null);
  var disp=inh?'<span class="iaSame">同</span>':'<span class="iaNum">'+resolveStd(it,t)+'</span>';
  return '<div class="iaCell" onclick="iaTapNum('+i+',\''+t+'\')">'+disp+'</div>';
}
function iaTapNum(i,t){ if(iaEdit.i===i&&iaEdit.t===t){ iaEdit={i:-1,t:''}; } else { iaEdit={i:i,t:t}; } renderItemsAdmin(); }
function iaBump(i,t,d){ var it=DB.items[i]; var nv=Math.max(0,Math.round((resolveStd(it,t)+d)*2)/2);
  if(t==='ph'){ it.stdPH=(nv===it.std?null:nv); } else if(t==='hol'){ it.stdHol=(nv===it.std?null:nv); } else { it.std=nv; }
  save(); renderItemsAdmin(); }
function iaReset(i,t){ var it=DB.items[i]; if(t==='ph')it.stdPH=null; else if(t==='hol')it.stdHol=null; save(); renderItemsAdmin(); }
function toggleUnas(){ unasOpen=!unasOpen; renderItemsAdmin(); }
function addItemAdmin(){ var n=prompt('新品項名稱'); if(n===null)return; n=(''+n).trim(); if(!n)return; DB.items.push({name:n,area:'',unit:'份',std:1,min:10,band:'none',daily:false,enabled:true,cat:'',days:[],ops:[],opMin:{}}); save(); unasOpen=true; renderItemsAdmin(); }
function iaPickStation(i){ var it=DB.items[i];
  var opts=DB.areas.map(function(a){ return '<b class="'+(it.area===a.name?'on':'')+'" onclick="iaSetStation('+i+',\''+a.name+'\')"><span class="d" style="background:'+a.color+'"></span>'+a.name+'</b>'; }).join('')+'<b class="'+(!assigned(it)?'on':'')+'" onclick="iaSetStation('+i+',\'\')">未分配</b>';
  openSheetHtml('<div class="sheet-title">指派站別</div><div class="sheet-label" style="text-align:center;color:var(--ink3);font-size:12px;margin:6px 0 12px">'+it.name+'</div><div class="idSeg" style="justify-content:center">'+opts+'</div><div class="sheet-actions"><button class="b-done" onclick="closeSheet()">完成</button></div>'); }
function iaSetStation(i,area){ var it=DB.items[i]; DB.items.splice(i,1); it.area=area;
  if(area){ var lastAt=-1; for(var k=0;k<DB.items.length;k++){ if(DB.items[k].area===area) lastAt=k; } DB.items.splice(lastAt+1,0,it); }
  else { DB.items.push(it); }
  save(); closeSheet(); renderItemsAdmin(); }

/* 品項詳細 sheet */
function openItemDetail(i){ detSel=i; renderItemDetail(); }
function renderItemDetail(){ var i=detSel, it=DB.items[i]; if(!it)return;
  var areaSeg=DB.areas.map(function(a){ return '<b class="'+(it.area===a.name?'on':'')+'" onclick="dArea('+i+',\''+a.name+'\')"><span class="d" style="background:'+a.color+'"></span>'+a.name+'</b>'; }).join('')+'<b class="'+(!assigned(it)?'on':'')+'" onclick="dArea('+i+',\'\')">未分配</b>';
  var catSeg=catNames().map(function(c){ return '<b class="'+((it.cat||'')===c?'on':'')+'" onclick="dCat('+i+',\''+c+'\')"><span class="d" style="background:'+catColor(c)+'"></span>'+c+'</b>'; }).join('');
  var bands=[['none','待排'],['pre',BNAME.pre],['am',BNAME.am],['mid',BNAME.mid]];
  var bandSeg=bands.map(function(b){ return '<b class="'+(it.band===b[0]?'on':'')+'" onclick="dBand('+i+',\''+b[0]+'\')">'+b[1]+'</b>'; }).join('');
  var wk=[[1,'一'],[2,'二'],[3,'三'],[4,'四'],[5,'五'],[6,'六'],[0,'日']];
  var days=Array.isArray(it.days)?it.days:[];
  var wkHtml=wk.map(function(w){ return '<span class="wd'+(days.indexOf(w[0])>=0?' on':'')+'" onclick="dToggleDay('+i+','+w[0]+')">'+w[1]+'</span>'; }).join('');
  var inner='<div class="sheet-title">編輯品項</div>'
    +'<div style="height:12px"></div>'
    +'<div class="idField"><span class="fl">品名</span><div class="idVal" onclick="dRename('+i+')">'+it.name+'</div></div>'
    +'<div class="idRow2"><div class="idField"><span class="fl">單位</span><div class="idVal" onclick="dUnit('+i+')">'+it.unit+'</div></div><div class="idField"><span class="fl">預估分</span><div class="idVal" onclick="dMin('+i+')">'+it.min+' 分</div></div></div>'
    +'<div class="idField"><span class="fl">盤點站別</span><div class="idSeg">'+areaSeg+'</div></div>'
    +'<div class="idField"><div class="idTgRow"><span class="fl2">退冰<span class="tbHint">標了會進盤點頁的退冰打勾清單，不再盤點數量</span></span><div class="idTg'+(it.tuibing?' on':'')+'" onclick="dTuibing('+i+')"><i></i></div></div></div>'
    +'<div class="idField"><span class="fl">種類</span><div class="idSeg">'+catSeg+'</div></div>'
    +'<div class="idField"><span class="fl">作業選單（這個品項會用到哪些步驟，可複選）</span><div class="idSeg">'+opNames().map(function(op){ return '<b class="'+((it.ops||[]).indexOf(op)>=0?'on':'')+'" onclick="dToggleOp('+i+',\''+op+'\')">'+op+'</b>'; }).join('')+'</div>'+((it.ops&&it.ops.length)?('<div style="margin-top:2px">'+it.ops.map(function(op){ var m=(it.opMin&&it.opMin[op]!=null)?it.opMin[op]:0; return '<div class="opmin"><span class="on">'+op+'</span><span class="st"><button onclick="dOpMin('+i+',\''+op+'\',-1)">&minus;</button><span class="v" onclick="dOpMinSet('+i+',\''+op+'\')">'+m+'</span><button onclick="dOpMin('+i+',\''+op+'\',1)">&plus;</button></span><span class="u">分</span></div>'; }).join('')+'</div>'):'')+'<div class="tbHint" style="font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.5">設了作業後，可依作業各自叫出一張卡（如「'+it.name+'·分裝」），每個作業的預估分可分開調（從 0 起）。退冰請用上方退冰開關。</div></div>'
    +'<div class="idField"><span class="fl">建議時段（選填）</span><div class="idSeg">'+bandSeg+'</div></div>'
    +'<div class="idField"><div class="idTgRow"><span class="fl2">每日必備</span><div class="idTg'+(it.daily?' on':'')+'" onclick="dDaily('+i+')"><i></i></div></div></div>'
    +'<div class="idField"><span class="fl">排定週幾（每日必備可不設）</span><div class="idWk'+(it.daily?' muted':'')+'">'+wkHtml+'</div></div>'
    +'<button class="idDel" onclick="dDel('+i+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>刪除這個品項</button>'
    +'<div class="sheet-actions"><button class="b-done" onclick="closeSheet()">完成</button></div>';
  openSheetHtml(inner);
}
function dRename(i){ var it=DB.items[i], old=it.name; var v=prompt('修改品名', old); if(v===null)return; v=(''+v).trim(); if(!v||v===old)return; it.name=v;
  Object.keys(DB.days).forEach(function(dk){ var D=DB.days[dk]; if(D.counts&&D.counts[old]!=null){ D.counts[v]=D.counts[old]; delete D.counts[old]; } if(Array.isArray(D.tasks)) D.tasks.forEach(function(t){ if(t.name===old) t.name=v; }); });
  save(); renderItemDetail(); renderItemsAdmin(); }
function dUnit(i){ var v=prompt('修改單位', DB.items[i].unit); if(v===null)return; v=(''+v).trim(); if(v) DB.items[i].unit=v; save(); renderItemDetail(); renderItemsAdmin(); }
function dMin(i){ var v=prompt('預估分（製作時間）', DB.items[i].min); if(v===null)return; v=parseFloat(v); if(!isNaN(v)) DB.items[i].min=Math.max(0,v); save(); renderItemDetail(); }
function dCat(i,c){ DB.items[i].cat=c; save(); renderItemDetail(); }
function dToggleOp(i,op){ var it=DB.items[i]; if(!Array.isArray(it.ops))it.ops=[]; var k=it.ops.indexOf(op); if(k>=0)it.ops.splice(k,1); else it.ops.push(op); save(); renderItemDetail(); }
function dOpMin(i,op,delta){ var it=DB.items[i]; if(!it.opMin)it.opMin={}; var cur=(it.opMin[op]!=null)?it.opMin[op]:0; it.opMin[op]=Math.max(0,cur+delta); save(); renderItemDetail(); }
function dOpMinSet(i,op){ var it=DB.items[i]; var cur=(it.opMin&&it.opMin[op]!=null)?it.opMin[op]:0; var v=prompt('「'+op+'」預估分', cur); if(v===null)return; v=parseInt(v,10); if(isNaN(v))return; if(!it.opMin)it.opMin={}; it.opMin[op]=Math.max(0,v); save(); renderItemDetail(); }
function dArea(i,a){ DB.items[i].area=a; save(); renderItemDetail(); renderItemsAdmin(); }
function dBand(i,b){ DB.items[i].band=b; save(); renderItemDetail(); }
function dDaily(i){ DB.items[i].daily=!DB.items[i].daily; save(); renderItemDetail(); }
function dTuibing(i){ DB.items[i].tuibing=!DB.items[i].tuibing; save(); renderItemDetail(); renderItemsAdmin(); }
function dToggleDay(i,dd){ var it=DB.items[i]; if(!Array.isArray(it.days))it.days=[]; var k=it.days.indexOf(dd); if(k>=0)it.days.splice(k,1); else it.days.push(dd); save(); renderItemDetail(); }
function dDel(i){ var it=DB.items[i]; if(!it)return; if(!confirm('刪除「'+it.name+'」？此動作無法復原。'))return; DB.items.splice(i,1); save(); closeSheet(); renderItemsAdmin(); }

/* 拖曳排序（同區重排；拖過分隔線＝轉站別） */
function iaPointerDown(e){ var hand=e.target.closest('.iaHand'); if(!hand)return; var row=hand.closest('.iaRow'); if(!row)return;
  e.preventDefault(); iaEdit={i:-1,t:''};
  iaDrag={idx:parseInt(row.dataset.idx,10), startY:e.clientY, moved:false, clone:null, row:row, target:null, before:false};
  document.addEventListener('pointermove', iaPointerMove);
  document.addEventListener('pointerup', iaPointerUp);
  document.addEventListener('pointercancel', iaPointerUp); }
function iaPointerMove(e){ if(!iaDrag)return;
  if(!iaDrag.moved){ if(Math.abs(e.clientY-iaDrag.startY)<5)return; iaDrag.moved=true;
    var it=DB.items[iaDrag.idx]; var c=document.createElement('div'); c.className='iaClone'; c.textContent=it?it.name:''; document.body.appendChild(c); iaDrag.clone=c; iaDrag.row.classList.add('drag'); }
  e.preventDefault();
  if(iaDrag.clone){ iaDrag.clone.style.left='28px'; iaDrag.clone.style.top=(e.clientY-18)+'px'; }
  iaHitTest(e.clientY); }
function iaHitTest(y){ var rows=document.querySelectorAll('#itemsAdmin .iaRow'); iaDrag.target=null; iaDrag.before=false;
  for(var k=0;k<rows.length;k++){ rows[k].classList.remove('over'); }
  for(var k2=0;k2<rows.length;k2++){ var r=rows[k2]; if(r.classList.contains('drag'))continue; var rc=r.getBoundingClientRect();
    if(y < rc.top+rc.height/2){ iaDrag.target=r; iaDrag.before=true; r.classList.add('over'); return; } }
  if(rows.length){ var last=rows[rows.length-1]; if(last.classList.contains('drag')&&rows.length>1) last=rows[rows.length-2]; iaDrag.target=last; iaDrag.before=false; } }
function iaPointerUp(){ document.removeEventListener('pointermove', iaPointerMove); document.removeEventListener('pointerup', iaPointerUp); document.removeEventListener('pointercancel', iaPointerUp);
  var d=iaDrag; iaDrag=null; if(d&&d.clone)d.clone.remove();
  if(!d||!d.moved){ if(d&&d.row)d.row.classList.remove('drag'); return; }
  if(!d.target){ renderItemsAdmin(); return; }
  var fromIdx=d.idx, item=DB.items[fromIdx]; var tIdx=parseInt(d.target.dataset.idx,10), tArea=d.target.dataset.area;
  DB.items.splice(fromIdx,1); if(tIdx>fromIdx) tIdx--;
  var insertAt=d.before?tIdx:tIdx+1; item.area=tArea; DB.items.splice(insertAt,0,item);
  save(); renderItemsAdmin(); }


/* ====== nav ====== */
function go(p){ if(p==='admin' && !adminUnlocked){ openAdminGate(); return; }
  ['count','board','admin'].forEach(function(x){ document.getElementById('page-'+x).classList.toggle('on',x===p); var b=document.getElementById('n'+x.charAt(0).toUpperCase()+x.slice(1)); if(b)b.classList.toggle('on',x===p); });
  var ht=document.getElementById('hTitle'), hs=document.getElementById('hSub');
  if(p==='count'){ ht.textContent='今日備料檢查'; hs.textContent='每日13:00後請確認隔天備料是否充足'; }
  else if(p==='board'){ ht.textContent='工作分配'; hs.textContent='收班排定 → 隔天執行'; }
  else if(p==='admin'){ ht.textContent='後台設定'; hs.textContent='系統設定 · v2.0 退冰＋種類'; }
  if(p==='count') renderCount(); if(p==='board') renderBoard(); if(p==='admin'){ renderItemsAdmin(); renderStaff(); renderAreas(); renderCats(); renderOps(); renderBands(); renderSetup(); } }

function init(){
  bindDrag(); setV('people'); setT('I'); go('count');
  var iac=document.getElementById('itemsAdmin'); if(iac) iac.addEventListener('pointerdown', iaPointerDown);
  setInterval(checkRollover, 60*1000);
  checkForUpdate(); setInterval(checkForUpdate, 3*60*1000);
}
load(init);
</script>
</body>
